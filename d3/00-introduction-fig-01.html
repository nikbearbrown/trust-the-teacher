<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 0.1 — Book map: twelve chapters, three movements, one thread</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-white:     #FFFFFF;
    --color-ink:       #121212;
    --color-red:       #C8102E;
    --color-secondary: #545454;
    --color-border:    #D4D4D4;
    --color-ochre:     #C8860E;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #111111;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #2E2E2E;
      --color-ochre:     #D49A30;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-white);
    color: var(--color-ink);
    font-family: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
    padding: 24px;
  }
  h1 {
    font-family: 'EB Garamond', Georgia, serif;
    font-weight: 400;
    font-size: 28px;
    margin-bottom: 4px;
  }
  p.subtitle {
    color: var(--color-secondary);
    font-size: 13px;
    margin-bottom: 16px;
    max-width: 65ch;
  }
  #chart {
    width: 100%;
    min-height: 520px;
    position: relative;
  }
  .movement-header {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 14px;
    font-weight: 700;
    fill: var(--color-ink);
  }
  .movement-sub {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 12px;
    font-style: italic;
    fill: var(--color-secondary);
  }
  .movement-rule {
    stroke: var(--color-ink);
    stroke-width: 0.75;
  }
  .chapter-card {
    fill: var(--color-white);
    stroke: var(--color-secondary);
    stroke-width: 1;
    transition: stroke 200ms cubic-bezier(0.2,0.8,0.2,1),
                stroke-width 200ms cubic-bezier(0.2,0.8,0.2,1);
  }
  .chapter-card.thread {
    fill: var(--color-white);
    stroke: var(--color-ink);
    stroke-width: 1.25;
  }
  .chapter-card.capstone {
    stroke-width: 1.75;
  }
  .chapter-card:hover { stroke: var(--color-red); stroke-width: 2; }
  .chapter-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    fill: var(--color-secondary);
    text-transform: uppercase;
  }
  .chapter-title {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 400;
    fill: var(--color-ink);
  }
  .chapter-title.capstone { font-weight: 700; }
  .thread-line {
    fill: none;
    stroke: var(--color-red);
    stroke-width: 1.5;
    stroke-dasharray: 5 3;
  }
  .thread-dot {
    fill: var(--color-red);
  }
  .legend-text {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    fill: var(--color-ink);
  }
  .caption {
    color: var(--color-secondary);
    font-size: 13px;
    margin-top: 12px;
    max-width: 65ch;
    font-style: italic;
  }
  .tooltip {
    position: absolute;
    pointer-events: none;
    opacity: 0;
    background: var(--color-ink);
    color: var(--color-white);
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    max-width: 260px;
    line-height: 1.4;
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<h1>Figure 0.1 — The shape of the argument</h1>
<p class="subtitle">Twelve chapters group into three movements. A dashed thread traces the chapters in which the AI+1 teacher appears, before chapter twelve names her.</p>
<div id="chart" role="main"></div>
<p class="caption">Read in order: the wrong answers, then the evidence, then the work. The thread arrives by chapter twelve.</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const movements = [
  {
    id: 'I',
    title: 'Movement I',
    subtitle: 'The Wrong Answers',
    chapters: [
      { num: 1, title: 'The Ban',        thread: false, blurb: 'Removing the phone was right; removing the phone alone is not enough.' },
      { num: 2, title: 'The App',        thread: true,  blurb: 'WestEd ASSISTments: the platform was free; the investment was the teacher.' },
      { num: 3, title: 'The Clause',     thread: false, blurb: 'Four words — except for educational purposes — that no one has finished writing.' }
    ]
  },
  {
    id: 'II',
    title: 'Movement II',
    subtitle: 'The Evidence',
    chapters: [
      { num: 4, title: 'Teacher Variable',     thread: false, blurb: 'Forty years of research on the one variable that actually predicts learning.' },
      { num: 5, title: 'Professional Tool',    thread: true,  blurb: 'Tutor CoPilot RCT: AI extends the trained human and levels the floor.' },
      { num: 6, title: 'AI Dividend',          thread: true,  blurb: 'Six weeks of reclaimed time per year — and what trained teachers do with it.' },
      { num: 7, title: 'Cognitive Offloading', thread: false, blurb: 'What happens when students get the tool without the teacher.' }
    ]
  },
  {
    id: 'III',
    title: 'Movement III',
    subtitle: 'The Work',
    chapters: [
      { num: 8,  title: 'Train Like a Doctor',     thread: true, blurb: 'What medicine built for continuous practice — and how to build it for teaching.' },
      { num: 9,  title: 'Phone Fridays',           thread: true, blurb: 'Teacher discretion over technology, and the infrastructure that makes it possible.' },
      { num: 10, title: 'Three Honest Measures',   thread: false, blurb: 'Why student satisfaction is not enough — and what a real framework looks like.' },
      { num: 11, title: 'The Equity Argument',     thread: false, blurb: 'Why every problem in this book lands hardest on the students who can least afford it.' },
      { num: 12, title: 'The AI+1 Teacher',        thread: true, capstone: true, blurb: 'Capstone: the figure the book has been building since chapter two.' }
    ]
  }
];

// Order of thread connections (chapter numbers)
const threadOrder = [2, 5, 6, 8, 9, 12];

const tooltip = d3.select('body').append('div').attr('class', 'tooltip');
function showTooltip(event, d) {
  tooltip
    .html(`<strong>Chapter ${d.num} — ${d.title}</strong><br>${d.blurb}`)
    .style('left', (event.pageX + 12) + 'px')
    .style('top',  (event.pageY - 28) + 'px')
    .transition().duration(150).style('opacity', 1);
}
function moveTooltip(event) {
  tooltip
    .style('left', (event.pageX + 12) + 'px')
    .style('top',  (event.pageY - 28) + 'px');
}
function hideTooltip() {
  tooltip.transition().duration(100).style('opacity', 0);
}

function draw() {
  d3.select('#chart').selectAll('*').remove();

  const container = document.getElementById('chart');
  const totalWidth  = container.clientWidth  || 800;
  const totalHeight = 520;

  const margin = { top: 48, right: 24, bottom: 64, left: 24 };
  const chartWidth  = totalWidth  - margin.left - margin.right;
  const chartHeight = totalHeight - margin.top  - margin.bottom;

  const svg = d3.select('#chart')
    .append('svg')
      .attr('width',  totalWidth)
      .attr('height', totalHeight)
      .attr('role', 'img')
      .attr('aria-labelledby', 'chart-title chart-desc');

  svg.append('title').attr('id', 'chart-title')
    .text('Book map: twelve chapters across three movements, traced by the AI+1 teacher thread');
  svg.append('desc').attr('id', 'chart-desc')
    .text('Three columns group the book chapters into Movement I (Ch. 1–3 The Wrong Answers), Movement II (Ch. 4–7 The Evidence), and Movement III (Ch. 8–12 The Work). A dashed red line connects chapters 2, 5, 6, 8, 9, and 12 — the appearances of the AI+1 teacher.');

  const gChart = svg.append('g')
    .attr('class', 'g-chart')
    .attr('transform', `translate(${margin.left},${margin.top})`);

  // Three columns
  const columnCount = movements.length;
  const columnGap = 24;
  const columnWidth = (chartWidth - columnGap * (columnCount - 1)) / columnCount;
  const cardHeight = 56;
  const cardGap = 12;
  const headerHeight = 48;

  // Card position lookup, by chapter number
  const cardPositions = {};

  movements.forEach((mv, mvIdx) => {
    const colX = mvIdx * (columnWidth + columnGap);

    // Movement header
    const gHeader = gChart.append('g')
      .attr('class', 'g-movement-header')
      .attr('transform', `translate(${colX + columnWidth / 2}, 0)`);

    gHeader.append('text')
      .attr('class', 'movement-header')
      .attr('text-anchor', 'middle')
      .attr('y', 0)
      .text(mv.title);
    gHeader.append('text')
      .attr('class', 'movement-sub')
      .attr('text-anchor', 'middle')
      .attr('y', 18)
      .text(mv.subtitle);
    gHeader.append('line')
      .attr('class', 'movement-rule')
      .attr('aria-hidden', 'true')
      .attr('x1', -columnWidth / 2 + 8)
      .attr('x2',  columnWidth / 2 - 8)
      .attr('y1', 28)
      .attr('y2', 28);

    // Chapter cards
    const gCards = gChart.append('g').attr('class', 'g-cards');
    mv.chapters.forEach((ch, chIdx) => {
      const yTop = headerHeight + chIdx * (cardHeight + cardGap);
      cardPositions[ch.num] = {
        x: colX,
        y: yTop,
        w: columnWidth,
        h: cardHeight,
        midY: yTop + cardHeight / 2,
        leftX: colX,
        rightX: colX + columnWidth
      };

      const gCard = gCards.append('g')
        .attr('class', 'g-card')
        .attr('tabindex', 0)
        .attr('aria-label', `Chapter ${ch.num}: ${ch.title}${ch.thread ? ' (on the AI+1 teacher thread)' : ''}`)
        .on('mouseover', (event) => showTooltip(event, ch))
        .on('mousemove', moveTooltip)
        .on('mouseout', hideTooltip)
        .on('focus', (event) => showTooltip(event, ch))
        .on('blur', hideTooltip);

      let cardClass = 'chapter-card';
      if (ch.thread) cardClass += ' thread';
      if (ch.capstone) cardClass += ' capstone';

      gCard.append('rect')
        .attr('class', cardClass)
        .attr('x', colX)
        .attr('y', yTop)
        .attr('width', columnWidth)
        .attr('height', cardHeight);

      gCard.append('text')
        .attr('class', 'chapter-num')
        .attr('x', colX + 12)
        .attr('y', yTop + 18)
        .text(`Ch. ${ch.num}`);

      gCard.append('text')
        .attr('class', ch.capstone ? 'chapter-title capstone' : 'chapter-title')
        .attr('x', colX + 12)
        .attr('y', yTop + 38)
        .text(ch.title);
    });
  });

  // Thread connector path
  const threadGroup = gChart.append('g').attr('class', 'g-thread');

  const linkGenerator = d3.linkHorizontal()
    .source(d => d.source)
    .target(d => d.target);

  for (let i = 0; i < threadOrder.length - 1; i++) {
    const from = cardPositions[threadOrder[i]];
    const to   = cardPositions[threadOrder[i + 1]];
    if (!from || !to) continue;

    // Determine which side of each card to connect from.
    // If next card is to the right, exit right side; if same column or left, exit left side.
    const goingRight = to.leftX > from.rightX;
    const sourceX = goingRight ? from.rightX : from.leftX;
    const targetX = goingRight ? to.leftX    : to.rightX;

    const path = linkGenerator({
      source: [sourceX, from.midY],
      target: [targetX, to.midY]
    });

    threadGroup.append('path')
      .attr('class', 'thread-line')
      .attr('d', path)
      .attr('aria-hidden', 'true');

    // Dot on the source connection point
    threadGroup.append('circle')
      .attr('class', 'thread-dot')
      .attr('aria-hidden', 'true')
      .attr('cx', sourceX)
      .attr('cy', from.midY)
      .attr('r', 3.5);
  }

  // Final destination dot on chapter 12
  const last = cardPositions[threadOrder[threadOrder.length - 1]];
  if (last) {
    threadGroup.append('circle')
      .attr('class', 'thread-dot')
      .attr('aria-hidden', 'true')
      .attr('cx', last.leftX)
      .attr('cy', last.midY)
      .attr('r', 4.5);
  }

  // Legend (below the cards)
  const legendY = chartHeight - 8;
  const legend = gChart.append('g')
    .attr('class', 'g-legend')
    .attr('transform', `translate(0, ${legendY})`);

  // Thread swatch
  legend.append('rect')
    .attr('x', 0).attr('y', -10)
    .attr('width', 16).attr('height', 12)
    .attr('class', 'chapter-card thread');
  legend.append('text')
    .attr('class', 'legend-text')
    .attr('x', 22).attr('y', 0)
    .text('On the AI+1 thread');

  // Non-thread swatch
  legend.append('rect')
    .attr('x', 200).attr('y', -10)
    .attr('width', 16).attr('height', 12)
    .attr('class', 'chapter-card');
  legend.append('text')
    .attr('class', 'legend-text')
    .attr('x', 222).attr('y', 0)
    .text('Argument scaffolding');

  // Dashed line swatch
  legend.append('line')
    .attr('class', 'thread-line')
    .attr('x1', 420).attr('x2', 448)
    .attr('y1', -4).attr('y2', -4);
  legend.append('text')
    .attr('class', 'legend-text')
    .attr('x', 454).attr('y', 0)
    .text('The thread (Ch. 2 → 5 → 6 → 8 → 9 → 12)');
}

draw();
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
