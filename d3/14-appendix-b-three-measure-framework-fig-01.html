<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure B.1 — Three-measure framework overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-white:     #FFFFFF;
    --color-ink:       #121212;
    --color-red:       #C8102E;
    --color-secondary: #545454;
    --color-border:    #D4D4D4;
    --color-ochre:     #C8860E;
    --color-panel:     #F5F2EE;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #111111;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #2E2E2E;
      --color-ochre:     #D49A30;
      --color-panel:     #1A1714;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; padding: 24px; }
  h1 { font-family: 'EB Garamond', Georgia, serif; font-weight: 400; font-size: 28px; margin-bottom: 4px; }
  p.subtitle { color: var(--color-secondary); font-size: 13px; margin-bottom: 24px; max-width: 65ch; }
  #chart { width: 100%; min-height: 480px; }
  .panel { fill: var(--color-panel); stroke: var(--color-ink); stroke-width: 1; transition: stroke-width 200ms cubic-bezier(0.2,0.8,0.2,1); }
  .panel.missing { stroke-width: 1.5; }
  .panel:hover { stroke-width: 1.5; }
  .col-num { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 11px; fill: var(--color-secondary); }
  .col-head { font-family: 'EB Garamond', Georgia, serif; font-size: 13px; font-weight: 700; fill: var(--color-ink); }
  .row-head { font-family: 'EB Garamond', Georgia, serif; font-size: 11px; font-weight: 700; fill: var(--color-ink); }
  .body { font-family: 'EB Garamond', Georgia, serif; font-size: 10px; fill: var(--color-ink); }
  .forbidden { font-family: 'EB Garamond', Georgia, serif; font-size: 10px; font-style: italic; fill: var(--color-secondary); }
  .cite { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 10px; fill: var(--color-secondary); }
  .divider { stroke: var(--color-secondary); }
  .bind-box { fill: var(--color-white); stroke: var(--color-ink); stroke-width: 1; }
  .bind-text { font-family: 'EB Garamond', Georgia, serif; font-size: 11px; font-weight: 700; fill: var(--color-ink); }
  .bind-line { stroke: var(--color-ink); stroke-width: 1; stroke-dasharray: 3 2; fill: none; }
  .caption { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 11px; fill: var(--color-secondary); margin-top: 12px; }
  .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-ink); color: var(--color-white); padding: 6px 10px; font-family: 'Inter', sans-serif; font-size: 12px; max-width: 260px; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<h1>Figure B.1 — The three-measure framework</h1>
<p class="subtitle">None is sufficient alone. Each is used only for what it can defensibly measure; the forbidden use is named explicitly.</p>
<div id="chart" role="img" aria-labelledby="chart-title chart-desc"></div>
<p class="caption">Measure 3 is the missing one. Its absence is why everything else in this book is hard to operationalise.</p>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const measureData = [
  {
    id: 'wellbeing',
    num: 'Measure 1',
    head: 'Student Wellbeing',
    what: ['Relational climate.', 'Respect, intellectual', 'challenge, treatment of', 'students as people.'],
    use:  ['Formative feedback to', 'the teacher; aggregate', 'monitoring at the', 'department level.'],
    forbidden: ['Individual score as primary', 'input to tenure, contract,', 'salary, promotion.'],
    cite: '(ASA 2019)',
    tooltip: 'Measure 1: Student Wellbeing. Use it for relational-climate feedback and department-level monitoring. Do not use individual scores for tenure or contract decisions.',
    missing: false
  },
  {
    id: 'gains',
    num: 'Measure 2',
    head: 'Student Learning Gains',
    what: ['Distance the section', 'travelled. Common pre/post,', 'externally graded, includes', 'transfer items.'],
    use:  ['Section-level reporting', 'to the teaching team.', 'Formative for the first', 'three cycles, minimum.'],
    forbidden: ['Year-over-year individual', 'decisions on single-section', 'noisy value-added estimates.'],
    cite: '(MET Project warning)',
    tooltip: 'Measure 2: Student Learning Gains. Common pre/post, external grading, section-level reporting, transfer items, no individual stakes in early years.',
    missing: false
  },
  {
    id: 'learning',
    num: 'Measure 3 — the missing one',
    head: 'Teacher Learning',
    what: ['Documented annual cycle:', 'growth area, PD engaged,', 'evidence of practice change,', 'peer panel review.'],
    use:  ['Portfolio archive; basis', 'for differential recognition', 'once the infrastructure', 'matures.'],
    forbidden: ['Treating PD attendance as', 'evidence of practice change.', 'August workshop log fails.'],
    cite: '(ABFM model analog)',
    tooltip: 'Measure 3: Teacher Learning. The annual or biennial documented cycle nobody currently takes. Its absence is why the AI+1 teacher cannot be rewarded by the system.',
    missing: true
  }
];

const tooltip = d3.select('body').append('div').attr('class', 'tooltip');
function showTip(event, d) {
  tooltip.html(`<strong>${d.head}</strong><br/>${d.tooltip}`)
    .style('left', (event.pageX + 12) + 'px')
    .style('top',  (event.pageY - 28) + 'px')
    .transition().duration(150).style('opacity', 1);
}
function moveTip(event) { tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px'); }
function hideTip() { tooltip.transition().duration(100).style('opacity', 0); }

function draw() {
  const container = document.getElementById('chart');
  d3.select('#chart').selectAll('*').remove();
  const totalWidth  = container.clientWidth || 700;
  const totalHeight = 460;
  const margin = { top: 24, right: 24, bottom: 56, left: 24 };
  const innerW = totalWidth - margin.left - margin.right;
  const colGap = 16;
  const colWidth = (innerW - colGap * 2) / 3;

  const svg = d3.select('#chart').append('svg')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('role', 'img')
    .attr('aria-labelledby', 'chart-title chart-desc');
  svg.append('title').attr('id', 'chart-title').text('The three-measure framework — overview');
  svg.append('desc').attr('id', 'chart-desc').text('Three columns covering student wellbeing, student learning gains, and teacher learning; each names what it measures, the defensible use, and the forbidden use.');

  const gChart = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const cols = measureData.map((d, i) => ({ ...d, x: i * (colWidth + colGap) }));

  const colG = gChart.selectAll('.col')
    .data(cols, d => d.id)
    .join('g')
      .attr('class', 'col')
      .attr('transform', d => `translate(${d.x},0)`);

  colG.append('rect')
    .attr('class', d => d.missing ? 'panel missing' : 'panel')
    .attr('x', 0).attr('y', 0)
    .attr('width', colWidth).attr('height', 320)
    .attr('tabindex', 0)
    .attr('aria-label', d => `${d.head}: ${d.tooltip}`)
    .on('mouseover', showTip).on('mousemove', moveTip).on('mouseout', hideTip)
    .on('focus', (event, d) => showTip({ pageX: event.target.getBoundingClientRect().left + 80, pageY: event.target.getBoundingClientRect().top + 40 }, d))
    .on('blur', hideTip);

  colG.append('text')
    .attr('class', 'col-num')
    .attr('x', colWidth / 2).attr('y', 22)
    .attr('text-anchor', 'middle')
    .text(d => d.num);
  colG.append('text')
    .attr('class', 'col-head')
    .attr('x', colWidth / 2).attr('y', 42)
    .attr('text-anchor', 'middle')
    .text(d => d.head);
  colG.append('line')
    .attr('class', 'divider')
    .attr('x1', 16).attr('x2', colWidth - 16).attr('y1', 52).attr('y2', 52);

  // Sections
  const sections = [
    { title: 'What it measures', y: 70, key: 'what', cls: 'body' },
    { title: 'Defensible use',   y: 154, key: 'use',  cls: 'body' },
    { title: 'Forbidden use',    y: 238, key: 'forbidden', cls: 'forbidden' }
  ];
  sections.forEach(sec => {
    colG.append('text')
      .attr('class', 'row-head')
      .attr('x', 16).attr('y', sec.y)
      .text(sec.title);
    colG.each(function(d) {
      d3.select(this).selectAll(`.text-${sec.key}`)
        .data(d[sec.key])
        .join('text')
          .attr('class', `${sec.cls} text-${sec.key}`)
          .attr('x', 16)
          .attr('y', (_, i) => sec.y + 16 + i * 14)
          .text(t => t);
    });
  });

  colG.append('text')
    .attr('class', 'cite')
    .attr('x', 16).attr('y', 304)
    .text(d => d.cite);

  // Binding box
  const bindY = 348;
  const bindBoxX = innerW / 2 - 140;
  gChart.append('path')
    .attr('class', 'bind-line')
    .attr('d', `M ${colWidth / 2} 322 L ${colWidth / 2} ${bindY - 8} L ${innerW - colWidth / 2} ${bindY - 8} L ${innerW - colWidth / 2} 322`);
  gChart.append('path')
    .attr('class', 'bind-line')
    .attr('d', `M ${innerW / 2} ${bindY - 8} L ${innerW / 2} ${bindY - 2}`)
    .attr('marker-end', 'url(#arrowEnd1)');

  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrowEnd1').attr('markerWidth', 8).attr('markerHeight', 6)
    .attr('refX', 7).attr('refY', 3).attr('orient', 'auto')
    .append('polygon').attr('points', '0 0, 8 3, 0 6').attr('fill', 'currentColor');

  gChart.append('rect')
    .attr('class', 'bind-box')
    .attr('x', bindBoxX).attr('y', bindY)
    .attr('width', 280).attr('height', 32);
  gChart.append('text')
    .attr('class', 'bind-text')
    .attr('x', innerW / 2).attr('y', bindY + 20)
    .attr('text-anchor', 'middle')
    .text('Used together. None is sufficient alone.');
}

draw();
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
