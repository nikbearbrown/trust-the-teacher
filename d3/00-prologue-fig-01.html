<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 0.1 — Student vs teacher AI adoption asymmetry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-white:     #FFFFFF;
    --color-ink:       #121212;
    --color-red:       #C8102E;
    --color-secondary: #545454;
    --color-border:    #D4D4D4;
    --color-ochre:     #C8860E;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-white:     #111111;
      --color-ink:       #F0EBE3;
      --color-red:       #E8243A;
      --color-secondary: #A0978C;
      --color-border:    #2E2E2E;
      --color-ochre:     #D49A30;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-white); color: var(--color-ink); font-family: 'Inter', sans-serif; padding: 24px; }
  h1 { font-family: 'EB Garamond', Georgia, serif; font-weight: 400; font-size: 28px; margin-bottom: 4px; }
  p.subtitle { color: var(--color-secondary); font-size: 13px; margin-bottom: 24px; max-width: 65ch; }
  #chart { width: 100%; min-height: 460px; }
  .axis text { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--color-secondary); }
  .axis path, .axis line { stroke: var(--color-secondary); shape-rendering: crispEdges; }
  .gridline { stroke: var(--color-border); stroke-opacity: 0.6; stroke-dasharray: 2 3; }
  .bar { transition: opacity 200ms cubic-bezier(0.2,0.8,0.2,1); }
  .bar.student { fill: var(--color-red); }
  .bar.teacher { fill: var(--color-secondary); }
  .bar.reference { fill: none; stroke: var(--color-secondary); stroke-dasharray: 3 3; }
  .bar-value { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 700; fill: var(--color-ink); }
  .group-label { font-family: 'EB Garamond', Georgia, serif; font-size: 14px; font-weight: 500; fill: var(--color-ink); }
  .bar-label { font-family: 'Inter', sans-serif; font-size: 11px; fill: var(--color-secondary); }
  .divider { stroke: var(--color-border); }
  .annotation-line { stroke: var(--color-ink); stroke-dasharray: 4 3; fill: none; }
  .annotation-text { font-family: 'Inter', sans-serif; font-size: 12px; fill: var(--color-ink); }
  .caption { color: var(--color-secondary); font-size: 13px; margin-top: 16px; max-width: 65ch; font-style: italic; }
  .tooltip { position: absolute; pointer-events: none; opacity: 0; background: var(--color-ink); color: var(--color-white); padding: 6px 10px; font-size: 12px; font-family: 'Inter', sans-serif; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<h1>Figure 0.1 — Two numbers, same classroom</h1>
<p class="subtitle">Student use of generative AI versus teacher daily use of the same tools, 2025–26. Hover any bar to see source and population.</p>
<div id="chart" role="img" aria-labelledby="chart-title chart-desc"></div>
<p class="caption">Same classroom. Same tool. Two professional populations on opposite sides of fluency.</p>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const barData = [
  { group: 'Students', label: 'University, regular use',      value: 92, kind: 'student',   source: 'UK HEPI 2025 / replicated in LatAm' },
  { group: 'Students', label: 'Assessed coursework',          value: 94, kind: 'student',   source: 'UK HEPI 2025' },
  { group: 'Students', label: 'US middle/high school',        value: 62, kind: 'student',   source: 'US K-12 survey, 2025' },
  { group: 'Teachers', label: 'K-12, daily use',              value: 13.5, kind: 'teacher', source: 'US K-12 teacher survey, range 12–15%' },
  { group: 'Teachers', label: 'Business-school, daily',       value: 7,  kind: 'teacher',   source: 'Business-school faculty survey, 2025' },
  { group: 'Teachers', label: 'B-school, occasional',         value: 67, kind: 'reference', source: 'Two-thirds of faculty: occasional or rare use' }
];

const tooltip = d3.select('body').append('div').attr('class', 'tooltip');

function showTooltip(event, d) {
  tooltip.html(`<strong>${d.label}</strong><br>${d.value}%<br><span style="opacity:0.7">${d.source}</span>`)
    .style('left', (event.pageX + 12) + 'px')
    .style('top', (event.pageY - 28) + 'px')
    .transition().duration(150).style('opacity', 1);
}
function moveTooltip(event) {
  tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px');
}
function hideTooltip() {
  tooltip.transition().duration(100).style('opacity', 0);
}

function draw() {
  d3.select('#chart').selectAll('*').remove();
  const container = document.getElementById('chart');
  const totalWidth  = container.clientWidth  || 800;
  const totalHeight = 460;
  const margin = { top: 64, right: 32, bottom: 96, left: 64 };
  const chartWidth  = totalWidth  - margin.left - margin.right;
  const chartHeight = totalHeight - margin.top  - margin.bottom;

  const svg = d3.select('#chart').append('svg')
    .attr('width', totalWidth).attr('height', totalHeight)
    .attr('role', 'img').attr('aria-labelledby', 'chart-title chart-desc');
  svg.append('title').attr('id', 'chart-title').text('Student versus teacher AI adoption asymmetry');
  svg.append('desc').attr('id', 'chart-desc').text('Grouped bar chart contrasting student AI use (92, 94, 62 percent) with teacher daily use (12 to 15 percent and 7 percent) on a shared zero-baseline percentage axis.');

  const gChart = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const xScaleBand = d3.scaleBand().domain(barData.map(d => d.label)).range([0, chartWidth]).padding(0.18);
  const yScaleLinear = d3.scaleLinear().domain([0, 100]).range([chartHeight, 0]);

  // Gridlines
  gChart.append('g')
    .selectAll('line')
    .data(yScaleLinear.ticks(4))
    .join('line')
      .attr('class', 'gridline')
      .attr('x1', 0).attr('x2', chartWidth)
      .attr('y1', d => yScaleLinear(d)).attr('y2', d => yScaleLinear(d))
      .attr('aria-hidden', 'true');

  // Axes
  gChart.append('g').attr('class', 'axis')
    .call(d3.axisLeft(yScaleLinear).ticks(4).tickFormat(d => d + '%'));
  gChart.append('g').attr('class', 'axis')
    .attr('transform', `translate(0,${chartHeight})`)
    .call(d3.axisBottom(xScaleBand))
      .selectAll('text')
        .attr('transform', 'rotate(-22)')
        .style('text-anchor', 'end');

  // Group divider (between Students [first 3] and Teachers [last 3])
  const studentEnd = xScaleBand(barData[2].label) + xScaleBand.bandwidth();
  const teacherStart = xScaleBand(barData[3].label);
  const dividerX = (studentEnd + teacherStart) / 2;
  gChart.append('line')
    .attr('class', 'divider')
    .attr('x1', dividerX).attr('x2', dividerX)
    .attr('y1', 0).attr('y2', chartHeight)
    .attr('aria-hidden', 'true');

  // Group labels above
  const studentCenter = (xScaleBand(barData[0].label) + xScaleBand(barData[2].label) + xScaleBand.bandwidth()) / 2;
  const teacherCenter = (xScaleBand(barData[3].label) + xScaleBand(barData[5].label) + xScaleBand.bandwidth()) / 2;
  gChart.append('text').attr('class', 'group-label')
    .attr('x', studentCenter).attr('y', -28).attr('text-anchor', 'middle').text('Students');
  gChart.append('text').attr('class', 'group-label')
    .attr('x', teacherCenter).attr('y', -28).attr('text-anchor', 'middle').text('Teachers');

  // Bars
  gChart.selectAll('.bar')
    .data(barData)
    .join('rect')
      .attr('class', d => `bar ${d.kind}`)
      .attr('x', d => xScaleBand(d.label))
      .attr('y', d => yScaleLinear(d.value))
      .attr('width', xScaleBand.bandwidth())
      .attr('height', d => chartHeight - yScaleLinear(d.value))
      .attr('tabindex', 0)
      .attr('aria-label', d => `${d.label}: ${d.value}%`)
      .on('mouseover', showTooltip)
      .on('mousemove', moveTooltip)
      .on('mouseout', hideTooltip)
      .on('focus', function(event, d) {
        const r = this.getBoundingClientRect();
        showTooltip({pageX: r.left + r.width/2, pageY: r.top + window.scrollY}, d);
      })
      .on('blur', hideTooltip);

  // Value labels above each bar
  gChart.selectAll('.bar-value')
    .data(barData)
    .join('text')
      .attr('class', 'bar-value')
      .attr('x', d => xScaleBand(d.label) + xScaleBand.bandwidth() / 2)
      .attr('y', d => yScaleLinear(d.value) - 6)
      .attr('text-anchor', 'middle')
      .text(d => d.kind === 'teacher' && d.value === 13.5 ? '12–15%' : `${d.value}%`);
}

draw();
const ro = new ResizeObserver(() => draw());
ro.observe(document.getElementById('chart'));
</script>
</body>
</html>
