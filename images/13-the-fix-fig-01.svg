<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t13-01 d13-01">
  <title id="t13-01">Two diagnoses, one budget — content problem solved, incentive problem untouched</title>
  <desc id="d13-01">A two-column infographic. Left column ("Content problem") is labeled SOLVED, with examples HarvardX DPI 681M, CS50, MITx, Stanford Online, Carnegie Mellon. Right column ("Incentive problem") is labeled UNTOUCHED, with examples salary schedule, licensure hours, evaluation rubric. A descending arrow shows district spending currently flows almost entirely into the left column.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: bold; fill: #1a1714; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #1a1714; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
      .stamp { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-weight: bold; fill: #fdfcfb; }
    </style>
    <marker id="ar13a" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#1a1714"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>

  <!-- Title row -->
  <text x="350" y="30" class="ti" text-anchor="middle">When districts say "teachers need AI training," they are describing two problems</text>
  <text x="350" y="46" class="sm" text-anchor="middle">One is solved. The other has not been touched.</text>

  <!-- Column headers -->
  <text x="180" y="78" class="ti" text-anchor="middle">1. Content problem</text>
  <text x="180" y="94" class="sm" text-anchor="middle">Does high-quality material exist? Can a teacher access it?</text>

  <text x="520" y="78" class="ti" text-anchor="middle">2. Incentive problem</text>
  <text x="520" y="94" class="sm" text-anchor="middle">Does the institution recognize completion?</text>

  <!-- Stamps -->
  <rect x="120" y="106" width="120" height="22" fill="#1a1714"/>
  <text x="180" y="122" class="stamp" text-anchor="middle">SOLVED</text>

  <rect x="460" y="106" width="120" height="22" fill="#4a4540"/>
  <text x="520" y="122" class="stamp" text-anchor="middle">UNTOUCHED</text>

  <!-- Left column body -->
  <rect x="60" y="140" width="240" height="208" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <text x="180" y="162" class="lb" text-anchor="middle" font-weight="bold">Free, accredited, public since 2024</text>

  <line x1="76" y1="174" x2="284" y2="174" stroke="#c8c4c0" stroke-width="0.6"/>

  <text x="76" y="194" class="lb">HarvardX DPI 681M</text>
  <text x="76" y="208" class="sm">3 modules · Goel, Levy, Svoronos</text>

  <text x="76" y="228" class="lb">CS50 AI &amp; Prompt Engineering</text>
  <text x="76" y="242" class="sm">free audit · $150–$300 verified</text>

  <text x="76" y="262" class="lb">MIT OpenCourseWare</text>
  <text x="76" y="276" class="sm">equivalent introductory tracks</text>

  <text x="76" y="296" class="lb">Stanford Online</text>
  <text x="76" y="310" class="sm">course catalog, free audit</text>

  <text x="76" y="330" class="lb">Carnegie Mellon</text>
  <text x="76" y="344" class="sm">equivalents available</text>

  <!-- Right column body -->
  <rect x="400" y="140" width="240" height="208" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <text x="520" y="162" class="lb" text-anchor="middle" font-weight="bold">Recognition infrastructure untouched</text>

  <line x1="416" y1="174" x2="624" y2="174" stroke="#c8c4c0" stroke-width="0.6"/>

  <text x="416" y="194" class="lb">Salary schedule</text>
  <text x="416" y="208" class="sm">no line item for completion</text>

  <text x="416" y="228" class="lb">Licensure hours</text>
  <text x="416" y="242" class="sm">state PD framework ignores it</text>

  <text x="416" y="262" class="lb">Evaluation rubric</text>
  <text x="416" y="276" class="sm">no row any administrator reviews</text>

  <text x="416" y="296" class="lb">Portable credential</text>
  <text x="416" y="310" class="sm">district cannot read what travels</text>

  <text x="416" y="330" class="lb">Stipend or release time</text>
  <text x="416" y="344" class="sm">no budget line attached</text>

  <!-- District spending arrow flowing left -->
  <text x="350" y="372" class="lb" text-anchor="middle" font-weight="bold">Where district AI-training dollars go</text>
  <line x1="350" y1="382" x2="180" y2="382" stroke="#1a1714" stroke-width="1.4" marker-end="url(#ar13a)"/>
  <line x1="350" y1="382" x2="490" y2="382" stroke="#8a8480" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="265" y="396" class="sm" text-anchor="middle">~all spending flows here (vendor workshops on content)</text>
  <text x="555" y="396" class="sm" text-anchor="middle">negligible flow to recognition</text>

  <!-- Caption -->
  <text x="350" y="414" class="cap" text-anchor="middle">The diagnostic error: solving problem one harder while leaving problem two structurally unchanged.</text>
</svg>
