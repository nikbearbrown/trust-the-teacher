  <!-- Annotations -->
  <text x="64" y="110" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">51 pickups</text>
  <text x="64" y="124" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">median teenager, school hours</text>

  <text x="510" y="110" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="end">43 minutes total use</text>
  <text x="636" y="124" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">first bell to last</text>

  <!-- Caption -->
  <text x="350" y="392" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">Each dot is a state-reset. The high end of the distribution exceeds 498 pickups per day.</text>
</svg>
