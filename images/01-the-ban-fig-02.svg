<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="36" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">One school day, 51 pickups: the median teenager's attention auction</text>
  <text x="350" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="middle">Common Sense Media 2023 — dots mark phone pickups during school hours (8:00 a.m.–3:00 p.m.)</text>

  <!-- Timeline axis -->
  <line x1="64" y1="220" x2="636" y2="220" stroke="#1a1714" stroke-width="1.5"/>

  <!-- Hour ticks: 8 hours from 8:00 to 16:00 (3pm dismissal-ish, school day 8:00-15:00 = 7 hours; we'll mark 8 ticks) -->
  <text x="64" y="245" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">8:00</text>
  <line x1="64" y1="216" x2="64" y2="224" stroke="#1a1714" stroke-width="1"/>
  <text x="146" y="245" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">9:00</text>
  <line x1="146" y1="216" x2="146" y2="224" stroke="#1a1714" stroke-width="1"/>
  <text x="228" y="245" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">10:00</text>
  <line x1="228" y1="216" x2="228" y2="224" stroke="#1a1714" stroke-width="1"/>
  <text x="310" y="245" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">11:00</text>
  <line x1="310" y1="216" x2="310" y2="224" stroke="#1a1714" stroke-width="1"/>
  <text x="392" y="245" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">12:00</text>
  <line x1="392" y1="216" x2="392" y2="224" stroke="#1a1714" stroke-width="1"/>
  <text x="474" y="245" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">13:00</text>
  <line x1="474" y1="216" x2="474" y2="224" stroke="#1a1714" stroke-width="1"/>
  <text x="556" y="245" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">14:00</text>
  <line x1="556" y1="216" x2="556" y2="224" stroke="#1a1714" stroke-width="1"/>
  <text x="636" y="245" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">15:00</text>
  <line x1="636" y1="216" x2="636" y2="224" stroke="#1a1714" stroke-width="1"/>

  <!-- Class-period shading bands (23% of notifications arrive in-class — visualized as gray bars beneath axis) -->
  <rect x="80" y="252" width="60" height="20" fill="#c8c4c0" stroke="#8a8480" stroke-width="0.5"/>
  <rect x="160" y="252" width="60" height="20" fill="#c8c4c0" stroke="#8a8480" stroke-width="0.5"/>
  <rect x="240" y="252" width="60" height="20" fill="#c8c4c0" stroke="#8a8480" stroke-width="0.5"/>
  <rect x="330" y="252" width="60" height="20" fill="#c8c4c0" stroke="#8a8480" stroke-width="0.5"/>
  <rect x="410" y="252" width="60" height="20" fill="#c8c4c0" stroke="#8a8480" stroke-width="0.5"/>
  <rect x="490" y="252" width="60" height="20" fill="#c8c4c0" stroke="#8a8480" stroke-width="0.5"/>
  <rect x="570" y="252" width="60" height="20" fill="#c8c4c0" stroke="#8a8480" stroke-width="0.5"/>
  <text x="350" y="286" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">Shaded bands = class periods. ~23% of all notifications arrive during these bands.</text>

