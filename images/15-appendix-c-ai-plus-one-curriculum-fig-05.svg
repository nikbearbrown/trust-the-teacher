<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" role="img" aria-labelledby="t-c5 d-c5">
  <title id="t-c5">Year 1 through 5 state-level scaling timeline and credentialed-teacher trajectory</title>
  <desc id="d-c5">A five-year state-level scaling timeline. Year 1 forms the consortium and adopts the standard. Year 2 runs a pilot cohort of 100 to 200 teachers. Years 3 through 5 scale to roughly 500 new credentialed teachers per year and deploy the tutor-teacher network in every building. A line below the timeline traces cumulative credentialed teachers from zero in Year 1 to approximately 1,800 by Year 5, then to a steady-state trajectory of one thousand new credentialed teachers per year.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: bold; fill: #2a1a0e; }
      .h2 { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 12px; font-weight: bold; fill: #2a1a0e; }
      .lb { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .sm { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .num { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-weight: bold; fill: #2a1a0e; }
      .tick { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
      .eyebrow { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-weight: bold; fill: #4a4540; letter-spacing: 0.04em; }
    </style>
    <marker id="ar-c5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>
  <rect width="700" height="480" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" class="ti">Five years to a state-level program — what each year builds</text>
  <text x="350" y="48" text-anchor="middle" class="sm">Consortium → pilot → scale + tutor-teacher network → steady state</text>

  <!-- Year axis along the top -->
  <text x="60" y="80" class="eyebrow">YEAR</text>
  <g class="tick">
    <text x="160" y="80" text-anchor="middle">1</text>
    <text x="280" y="80" text-anchor="middle">2</text>
    <text x="400" y="80" text-anchor="middle">3</text>
    <text x="520" y="80" text-anchor="middle">4</text>
    <text x="640" y="80" text-anchor="middle">5+</text>
  </g>
  <line x1="100" y1="86" x2="660" y2="86" stroke="#2a1a0e" stroke-width="0.8"/>

  <!-- WORKSTREAM ROWS — three rows, each a colored band per year -->
  <!-- Workstream labels -->
  <text x="40" y="118" class="h2">Design</text>
  <text x="40" y="166" class="h2">Cohorts</text>
  <text x="40" y="214" class="h2">Tutor net.</text>

  <!-- Design workstream (Year 1 active; maintenance after) -->
  <rect x="100" y="100" width="120" height="32" fill="#2a1a0e" opacity="0.85"/>
  <text x="160" y="120" text-anchor="middle" class="lb" fill="#fdfcfb">consortium forms</text>
  <rect x="220" y="100" width="440" height="32" fill="#c8c4c0" opacity="0.5" stroke="#8a8480" stroke-width="0.5"/>
  <text x="440" y="120" text-anchor="middle" class="sm">standard revision · accreditation oversight</text>

  <!-- Cohorts workstream -->
  <rect x="220" y="148" width="120" height="32" fill="#4a4540"/>
  <text x="280" y="168" text-anchor="middle" class="sm" fill="#fdfcfb">pilot · 100–200</text>
  <rect x="340" y="148" width="120" height="32" fill="#8a8480"/>
  <text x="400" y="168" text-anchor="middle" class="sm" fill="#fdfcfb">+300 / yr</text>
  <rect x="460" y="148" width="120" height="32" fill="#4a4540"/>
  <text x="520" y="168" text-anchor="middle" class="sm" fill="#fdfcfb">+500 / yr</text>
  <rect x="580" y="148" width="80" height="32" fill="#2a1a0e" opacity="0.85"/>
  <text x="620" y="168" text-anchor="middle" class="sm" fill="#fdfcfb">1,000 / yr</text>

  <!-- Tutor-teacher network workstream -->
  <rect x="340" y="196" width="120" height="32" fill="#8a8480"/>
  <text x="400" y="216" text-anchor="middle" class="sm" fill="#fdfcfb">network seeded</text>
  <rect x="460" y="196" width="120" height="32" fill="#4a4540"/>
  <text x="520" y="216" text-anchor="middle" class="sm" fill="#fdfcfb">every building</text>
  <rect x="580" y="196" width="80" height="32" fill="#2a1a0e" opacity="0.85"/>
  <text x="620" y="216" text-anchor="middle" class="sm" fill="#fdfcfb">formula appropriation</text>

  <!-- year vertical gridlines -->
  <line x1="220" y1="98" x2="220" y2="230" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="340" y1="98" x2="340" y2="230" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="460" y1="98" x2="460" y2="230" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="580" y1="98" x2="580" y2="230" stroke="#c8c4c0" stroke-width="0.5"/>

  <!-- CUMULATIVE CREDENTIAL CHART -->
  <text x="40" y="262" class="eyebrow">CUMULATIVE CREDENTIALED AI+1 TEACHERS</text>
  <line x1="40" y1="270" x2="660" y2="270" stroke="#c8c4c0" stroke-width="0.5"/>

  <!-- Chart axes: chart frame 100..660 horizontally, 290..400 vertically (110 px tall) -->
  <!-- Y axis: 0 to 2000 -->
  <line x1="100" y1="290" x2="100" y2="400" stroke="#8a8480" stroke-width="1"/>
  <line x1="100" y1="400" x2="660" y2="400" stroke="#8a8480" stroke-width="1"/>
  <!-- Y ticks 0, 1000, 2000 -->
  <text x="96" y="402" text-anchor="end" class="tick">0</text>
  <line x1="98" y1="345" x2="100" y2="345" stroke="#4a4540"/>
  <text x="96" y="348" text-anchor="end" class="tick">1,000</text>
  <line x1="98" y1="290" x2="100" y2="290" stroke="#4a4540"/>
  <text x="96" y="293" text-anchor="end" class="tick">2,000</text>

  <!-- Cumulative data: Y1 0 (end), Y2 150 (pilot starting), Y3 450 (pilot continues + 300 new), Y4 900 (pilot completes + 500 new), Y5+ steady → 1800 by end of year 5+ -->
  <!-- Map Y1=160 (x for end of year 1), Y2 end 280, Y3 end 400, Y4 end 520, Y5 end 640 -->
  <!-- y values mapped: 0→400, 2000→290, slope = 110/2000 = 0.055 -->

  <polyline points="160,400 280,392 400,375 520,351 640,301"
            fill="none" stroke="#2a1a0e" stroke-width="1.75"/>

  <!-- data dots -->
  <circle cx="160" cy="400" r="3.5" fill="#2a1a0e"/>
  <circle cx="280" cy="392" r="3.5" fill="#2a1a0e"/>
  <circle cx="400" cy="375" r="3.5" fill="#2a1a0e"/>
  <circle cx="520" cy="351" r="3.5" fill="#2a1a0e"/>
  <circle cx="640" cy="301" r="3.5" fill="#2a1a0e"/>

  <!-- data labels above dots -->
  <text x="160" y="390" text-anchor="middle" class="num">0</text>
  <text x="280" y="382" text-anchor="middle" class="num">~150</text>
  <text x="400" y="365" text-anchor="middle" class="num">~450</text>
  <text x="520" y="341" text-anchor="middle" class="num">~900</text>
  <text x="640" y="291" text-anchor="middle" class="num">~1,800</text>

  <!-- x ticks aligned with year columns -->
  <line x1="160" y1="400" x2="160" y2="404" stroke="#4a4540"/>
  <line x1="280" y1="400" x2="280" y2="404" stroke="#4a4540"/>
  <line x1="400" y1="400" x2="400" y2="404" stroke="#4a4540"/>
  <line x1="520" y1="400" x2="520" y2="404" stroke="#4a4540"/>
  <line x1="640" y1="400" x2="640" y2="404" stroke="#4a4540"/>
  <text x="160" y="416" text-anchor="middle" class="tick">end Y1</text>
  <text x="280" y="416" text-anchor="middle" class="tick">end Y2</text>
  <text x="400" y="416" text-anchor="middle" class="tick">end Y3</text>
  <text x="520" y="416" text-anchor="middle" class="tick">end Y4</text>
  <text x="640" y="416" text-anchor="middle" class="tick">end Y5</text>

  <!-- Annotation: steady state target -->
  <line x1="640" y1="296" x2="600" y2="260" stroke="#2a1a0e" stroke-width="0.75" stroke-dasharray="3 2" marker-end="url(#ar-c5)"/>
  <text x="600" y="252" text-anchor="end" class="lb">→ steady state: +1,000/yr</text>

  <!-- Footer: long-run math -->
  <line x1="40" y1="436" x2="660" y2="436" stroke="#c8c4c0" stroke-width="0.75"/>
  <text x="60" y="456" class="eyebrow">LONG-RUN MATH FOR A 100,000-TEACHER STATE</text>
  <text x="60" y="470" class="sm">10% credentialed in a decade · 25% in fifteen years · critical-mass workforce within twenty.</text>
</svg>
