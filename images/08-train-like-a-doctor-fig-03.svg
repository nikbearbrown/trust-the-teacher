<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="32" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">U.S. teaching is spread: pedagogical knowledge distribution, OECD TKS 2024</text>

  <!-- Plot area -->
  <line x1="160" y1="64" x2="160" y2="296" stroke="#1a1714" stroke-width="1"/>
  <line x1="160" y1="296" x2="640" y2="296" stroke="#1a1714" stroke-width="1"/>

  <!-- x-axis ticks (0 to 100%) -->
  <text x="160" y="316" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">0%</text>
  <text x="280" y="316" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">25%</text>
  <text x="400" y="316" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">50%</text>
  <text x="520" y="316" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">75%</text>
  <text x="640" y="316" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">100%</text>
  <text x="400" y="332" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="middle">Share of teachers at each level of general pedagogical knowledge</text>

  <!-- Stacked horizontal bars: width 480 = 100%; 4.8 px per 1% -->
  <!-- United States row -->
  <text x="152" y="98" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="end">United States</text>
  <!-- Level 1: 20% (96 px); Level 2: 29% (139 px); Level 3: 51% (245 px) -->
  <rect x="160" y="80" width="96" height="36" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
  <rect x="256" y="80" width="139" height="36" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <rect x="395" y="80" width="245" height="36" fill="#1a1714" stroke="#1a1714" stroke-width="1"/>
  <text x="208" y="103" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">20%</text>
  <text x="325" y="103" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">29%</text>
  <text x="517" y="103" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#fdfcfb" text-anchor="middle">51%</text>

  <!-- Comparison: typical OECD country (illustrative average) — Level 1 ~12%, Level 2 ~50%, Level 3 ~38% -->
  <text x="152" y="158" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="end">Typical OECD country</text>
  <rect x="160" y="140" width="58" height="36" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
  <rect x="218" y="140" width="240" height="36" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <rect x="458" y="140" width="182" height="36" fill="#1a1714" stroke="#1a1714" stroke-width="1"/>
  <text x="189" y="163" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">12%</text>
  <text x="338" y="163" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">50%</text>
  <text x="549" y="163" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#fdfcfb" text-anchor="middle">38%</text>

  <!-- IQR brackets -->
  <text x="152" y="220" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="end">U.S. IQR</text>
  <line x1="160" y1="226" x2="433.6" y2="226" stroke="#1a1714" stroke-width="1.5"/>
  <line x1="160" y1="220" x2="160" y2="232" stroke="#1a1714" stroke-width="1.5"/>
  <line x1="433.6" y1="220" x2="433.6" y2="232" stroke="#1a1714" stroke-width="1.5"/>
  <text x="296" y="216" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">57-point spread</text>
  <text x="296" y="244" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">Largest variance in the comparison set</text>

  <text x="152" y="276" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="end">Typical OECD IQR</text>
  <line x1="160" y1="282" x2="316" y2="282" stroke="#8a8480" stroke-width="1.5"/>
  <line x1="160" y1="276" x2="160" y2="288" stroke="#8a8480" stroke-width="1.5"/>
  <line x1="316" y1="276" x2="316" y2="288" stroke="#8a8480" stroke-width="1.5"/>
  <text x="238" y="294" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">~ 32-point spread (illustrative)</text>

  <!-- Legend -->
  <rect x="160" y="350" width="14" height="14" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
  <text x="180" y="362" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Level 1 (foundational)</text>
  <rect x="320" y="350" width="14" height="14" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <text x="340" y="362" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Level 2 (intermediate)</text>
  <rect x="480" y="350" width="14" height="14" fill="#1a1714" stroke="#1a1714" stroke-width="1"/>
  <text x="500" y="362" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Level 3 (advanced)</text>

  <!-- Caption -->
  <text x="350" y="388" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">The variance is the case for the three-layer infrastructure.</text>
  <text x="350" y="404" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">A uniform PD requirement misses both tails. Source: OECD Teacher Knowledge Survey 2024–2026.</text>
</svg>
