<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t03 d03">
  <title id="t03">Carrell-West reversal — student evaluations track first-course grades, not downstream learning</title>
  <desc id="d03">Two crossing lines compare Calc I, Calc II, and Calc III grades for students taught by less-experienced and experienced instructors. Background bars show inversely tracking student evaluation ratings.</desc>
  <defs>
    <marker id="arrow03" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="440" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="30" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1714">The Carrell-West reversal — evaluations rewarded the wrong instructors</text>
  <text x="350" y="48" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#4a4540">U.S. Air Force Academy, random assignment, common downstream finals (Carrell &amp; West 2010)</text>

  <!-- Background evaluation bars (inversely tracking) -->
  <!-- Section labels on right -->
  <text x="660" y="80" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" text-anchor="end" fill="#8a8480">Student evaluation rating (background)</text>

  <!-- Light bars under each course position, showing evaluations -->
  <!-- Less-experienced got HIGHER evals (4.3) -->
  <rect x="110" y="92" width="120" height="22" fill="#e8e4df" stroke="#c8c4c0" stroke-width="0.5"/>
  <text x="170" y="107" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">eval: 4.3 (less-exp.)</text>

  <!-- Experienced got LOWER evals (3.6) -->
  <rect x="240" y="92" width="100" height="22" fill="#d4d0cc" stroke="#c8c4c0" stroke-width="0.5"/>
  <text x="290" y="107" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">eval: 3.6 (exp.)</text>

  <!-- Plot frame -->
  <line x1="100" y1="130" x2="100" y2="360" stroke="#1a1714" stroke-width="1"/>
  <line x1="100" y1="360" x2="620" y2="360" stroke="#1a1714" stroke-width="1"/>

  <!-- Y axis label -->
  <text x="50" y="245" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714" transform="rotate(-90, 50, 245)">Section mean grade (standardized)</text>

  <!-- Y ticks: low / mid / high -->
  <line x1="96" y1="360" x2="100" y2="360" stroke="#1a1714"/>
  <text x="92" y="364" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">lower</text>
  <line x1="96" y1="245" x2="100" y2="245" stroke="#1a1714"/>
  <text x="92" y="249" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">mean</text>
  <line x1="96" y1="130" x2="100" y2="130" stroke="#1a1714"/>
  <text x="92" y="134" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">higher</text>

  <!-- X categories -->
  <text x="170" y="380" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">Calc I</text>
  <text x="170" y="394" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" text-anchor="middle" fill="#4a4540">(taught by instructor)</text>
  <text x="360" y="380" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">Calc II</text>
  <text x="360" y="394" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" text-anchor="middle" fill="#4a4540">(downstream, blind-graded)</text>
  <text x="550" y="380" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">Calc III</text>
  <text x="550" y="394" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" text-anchor="middle" fill="#4a4540">(downstream, blind-graded)</text>

  <!-- Vertical gridlines at category positions -->
  <line x1="170" y1="130" x2="170" y2="360" stroke="#c8c4c0" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="360" y1="130" x2="360" y2="360" stroke="#c8c4c0" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="550" y1="130" x2="550" y2="360" stroke="#c8c4c0" stroke-width="0.5" stroke-dasharray="2,3"/>

  <!-- Line A: less-experienced instructors — starts HIGH (Calc I), drops below (Calc II/III) -->
  <!-- Calc I: y=170 (higher), Calc II: y=290, Calc III: y=325 -->
  <polyline points="170,170 360,290 550,325" fill="none" stroke="#1a1714" stroke-width="2.25"/>
  <circle cx="170" cy="170" r="5" fill="#1a1714"/>
  <circle cx="360" cy="290" r="5" fill="#1a1714"/>
  <circle cx="550" cy="325" r="5" fill="#1a1714"/>

  <!-- Line B: experienced PhD faculty — starts LOW (Calc I), rises above (Calc II/III) -->
  <!-- Calc I: y=295, Calc II: y=210, Calc III: y=165 -->
  <polyline points="170,295 360,210 550,165" fill="none" stroke="#4a4540" stroke-width="2.25" stroke-dasharray="6,4"/>
  <circle cx="170" cy="295" r="5" fill="#fdfcfb" stroke="#4a4540" stroke-width="2"/>
  <circle cx="360" cy="210" r="5" fill="#fdfcfb" stroke="#4a4540" stroke-width="2"/>
  <circle cx="550" cy="165" r="5" fill="#fdfcfb" stroke="#4a4540" stroke-width="2"/>

  <!-- Crossover marker -->
  <circle cx="265" cy="232" r="14" fill="none" stroke="#c8860e" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="265" y="252" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" text-anchor="middle" fill="#c8860e">crossover</text>

  <!-- Line labels at endpoints -->
  <text x="565" y="329" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Less-experienced</text>
  <text x="565" y="343" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">(taught to the test)</text>
  <text x="565" y="161" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Experienced PhD</text>
  <text x="565" y="175" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">(taught for transfer)</text>

  <!-- Annotation arrow -->
  <path d="M 170 152 Q 200 70 350 70" fill="none" stroke="#1a1714" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow03)"/>
  <text x="360" y="74" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714">Higher Calc I grade, higher evaluation</text>

  <!-- Caption -->
  <text x="350" y="416" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Student evaluations tracked the first-course grade, not the downstream performance the system was supposedly measuring.</text>
  <text x="350" y="430" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">The instructors with the worse evaluations were producing the better long-run learning.</text>
</svg>
