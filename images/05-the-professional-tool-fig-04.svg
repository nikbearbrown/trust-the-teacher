<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="32" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Tutor CoPilot effect on student topic mastery, by tutor rating tercile</text>

  <!-- Plot frame -->
  <line x1="96" y1="72" x2="96" y2="320" stroke="#8a8480" stroke-width="1"/>
  <line x1="96" y1="320" x2="640" y2="320" stroke="#8a8480" stroke-width="1"/>

  <!-- y-axis grid + labels (0..10 pp) -->
  <line x1="96" y1="296" x2="640" y2="296" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="96" y1="272" x2="640" y2="272" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="96" y1="248" x2="640" y2="248" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="96" y1="224" x2="640" y2="224" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="96" y1="200" x2="640" y2="200" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="96" y1="176" x2="640" y2="176" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="96" y1="152" x2="640" y2="152" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="96" y1="128" x2="640" y2="128" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="96" y1="104" x2="640" y2="104" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="96" y1="80" x2="640" y2="80" stroke="#c8c4c0" stroke-width="0.5"/>

  <text x="88" y="324" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="end">0</text>
  <text x="88" y="276" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="end">2</text>
  <text x="88" y="228" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="end">4</text>
  <text x="88" y="180" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="end">6</text>
  <text x="88" y="132" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="end">8</text>
  <text x="88" y="84" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="end">10</text>

  <!-- y-axis title -->
  <text x="40" y="196" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="middle" transform="rotate(-90 40 196)">Percentage-point gain in topic mastery</text>

  <!-- Three bars: lower-rated (~9 pp), mid (~4 pp), higher (~1 pp) -->
  <!-- Scale: 12 px per 1 pp (since y=320 is 0; y=80 is 10pp; difference 240 / 10 = 24 px / pp). Adjust: actually 24 px/pp -->
  <!-- 9pp -> 216 from 320 -> y=104, height=216 -->
  <!-- 4pp -> 96 from 320 -> y=224, height=96 -->
  <!-- 1pp -> 24 from 320 -> y=296, height=24 -->

  <rect x="156" y="104" width="96" height="216" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <rect x="304" y="224" width="96" height="96" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <rect x="452" y="296" width="96" height="24" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>

  <!-- Value labels on bars -->
  <text x="204" y="96" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#1a1714" text-anchor="middle">+9 pp</text>
  <text x="352" y="216" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#1a1714" text-anchor="middle">+4 pp</text>
  <text x="500" y="288" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#1a1714" text-anchor="middle">~0 pp</text>

  <!-- x-axis labels -->
  <text x="204" y="340" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">Lower-rated tutors</text>
  <text x="204" y="356" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">(bottom tercile)</text>
  <text x="352" y="340" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">Mid-rated tutors</text>
  <text x="352" y="356" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">(middle tercile)</text>
  <text x="500" y="340" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">Higher-rated tutors</text>
  <text x="500" y="356" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">(top tercile)</text>

  <!-- Average reference line at 4 pp -->
  <line x1="96" y1="224" x2="640" y2="224" stroke="#1a1714" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="632" y="218" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">Pooled average: +4 pp</text>

  <!-- Caption -->
  <text x="350" y="386" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">The tool levels the floor. Gains concentrate at the bottom of the tutor skill distribution.</text>
  <text x="350" y="402" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">Source: Wang, Ribeiro, Robinson, Loeb, &amp; Demszky (2024), arXiv:2410.03017.</text>
</svg>
