<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="420" fill="#fdfcfb"/>
  <text x="350" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1714">One week in the AI+1 classroom — what AI handles, what the teacher handles</text>
  <text x="350" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#4a4540">Seventh-grade humanities, 28 students, a Frederick Douglass primary-source unit</text>

  <!-- Header row -->
  <rect x="32" y="68" width="88" height="32" fill="#1a1714" stroke="#1a1714"/>
  <text x="76" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fdfcfb">Day</text>
  <rect x="120" y="68" width="280" height="32" fill="#1a1714" stroke="#1a1714"/>
  <text x="260" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fdfcfb">AI handles</text>
  <rect x="400" y="68" width="268" height="32" fill="#1a1714" stroke="#1a1714"/>
  <text x="534" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fdfcfb">Teacher handles</text>

  <!-- Monday -->
  <rect x="32" y="100" width="88" height="56" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="76" y="124" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Mon</text>
  <text x="76" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Differentiation</text>
  <rect x="120" y="100" width="280" height="56" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="128" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Generates 3 reading-level versions</text>
  <text x="128" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">of the Douglass source + standards-</text>
  <text x="128" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">aligned comprehension questions</text>
  <rect x="400" y="100" width="268" height="56" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="408" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Edits AI outputs against rubric;</text>
  <text x="408" y="136" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">decides which version each student</text>
  <text x="408" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">receives. 8 min model + 12 min her</text>

  <!-- Tuesday -->
  <rect x="32" y="156" width="88" height="56" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="76" y="180" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Tue</text>
  <text x="76" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Marcus</text>
  <rect x="120" y="156" width="280" height="56" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="128" y="176" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Nothing — the AI is not in</text>
  <text x="128" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">the room for this 15 minutes</text>
  <text x="128" y="208" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">between classes</text>
  <rect x="400" y="156" width="268" height="56" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="408" y="176" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Hears the wrong note in Marcus's</text>
  <text x="408" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">"why"; asks the question 4 ways</text>
  <text x="408" y="208" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">until an honest wrong answer arrives</text>

  <!-- Wednesday -->
  <rect x="32" y="212" width="88" height="56" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="76" y="236" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Wed</text>
  <text x="76" y="252" font-family="Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Discussion</text>
  <rect x="120" y="212" width="280" height="56" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="128" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Nothing — fishbowl seating, a</text>
  <text x="128" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Harkness protocol, students</text>
  <text x="128" y="264" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">reasoning at each other</text>
  <rect x="400" y="212" width="268" height="56" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="408" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Designed the protocol, taught the</text>
  <text x="408" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">moves; takes notes on who has not</text>
  <text x="408" y="264" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">yet spoken anything she can grade</text>

  <!-- Thursday -->
  <rect x="32" y="268" width="88" height="56" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="76" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Thu</text>
  <text x="76" y="308" font-family="Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Formative</text>
  <rect x="120" y="268" width="280" height="56" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="128" y="288" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Generates a quiz against unit</text>
  <text x="128" y="304" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">standards; scores against a rubric;</text>
  <text x="128" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">surfaces patterns of confusion</text>
  <rect x="400" y="268" width="268" height="56" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="408" y="288" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Recognizes 3 predictable patterns</text>
  <text x="408" y="304" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">and one she did not expect; rewrites</text>
  <text x="408" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Friday's lesson around all four</text>

  <!-- Friday -->
  <rect x="32" y="324" width="88" height="56" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="76" y="348" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Fri</text>
  <text x="76" y="364" font-family="Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Re-taught</text>
  <rect x="120" y="324" width="280" height="56" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="128" y="344" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Nothing — the tool's job ended</text>
  <text x="128" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Thursday when the patterns were</text>
  <text x="128" y="376" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">surfaced</text>
  <rect x="400" y="324" width="268" height="56" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="408" y="344" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Teaches the lesson she would have</text>
  <text x="408" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">taught if she'd had 3 uninterrupted</text>
  <text x="408" y="376" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">hours of diagnostic time — that she does not have</text>

  <text x="350" y="406" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" text-anchor="middle" fill="#4a4540">The dividend creates the possibility. The trained teacher converts it into a Tuesday with Marcus.</text>
</svg>
