<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="36" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Two facially neutral policies, one household: the 2025 double subtraction</text>
  <text x="350" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="middle">Federal E-Rate hotspot funding (timeline below) vs. state phone-ban enactments (timeline above)</text>

  <!-- Top: state phone bans (stacked markers above timeline) -->
  <text x="56" y="100" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">State phone-ban enactments</text>

  <!-- Stacked rectangles representing states banning -->
  <rect x="280" y="108" width="40" height="14" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/>
  <text x="300" y="118" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#1a1714" text-anchor="middle">FL '23</text>
  <rect x="380" y="108" width="40" height="14" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/>
  <text x="400" y="118" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#1a1714" text-anchor="middle">CA '24</text>
  <rect x="380" y="124" width="40" height="14" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/>
  <text x="400" y="134" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#1a1714" text-anchor="middle">OH '24</text>
  <rect x="380" y="140" width="40" height="14" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/>
  <text x="400" y="150" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#1a1714" text-anchor="middle">LA '24</text>
  <rect x="480" y="108" width="40" height="14" fill="#4a4540" stroke="#1a1714" stroke-width="1"/>
  <text x="500" y="118" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#fdfcfb" text-anchor="middle">NY '25</text>
  <rect x="480" y="124" width="40" height="14" fill="#4a4540" stroke="#1a1714" stroke-width="1"/>
  <text x="500" y="134" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#fdfcfb" text-anchor="middle">TX '25</text>
  <rect x="480" y="140" width="40" height="14" fill="#4a4540" stroke="#1a1714" stroke-width="1"/>
  <text x="500" y="150" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#fdfcfb" text-anchor="middle">AR '25</text>
  <rect x="480" y="156" width="40" height="14" fill="#4a4540" stroke="#1a1714" stroke-width="1"/>
  <text x="500" y="166" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="9" fill="#fdfcfb" text-anchor="middle">+15</text>

  <!-- Central timeline -->
  <line x1="120" y1="210" x2="660" y2="210" stroke="#1a1714" stroke-width="1.5"/>
  <line x1="180" y1="206" x2="180" y2="214" stroke="#1a1714" stroke-width="1"/>
  <line x1="300" y1="206" x2="300" y2="214" stroke="#1a1714" stroke-width="1"/>
  <line x1="400" y1="206" x2="400" y2="214" stroke="#1a1714" stroke-width="1"/>
  <line x1="500" y1="206" x2="500" y2="214" stroke="#1a1714" stroke-width="1"/>
  <line x1="600" y1="206" x2="600" y2="214" stroke="#1a1714" stroke-width="1"/>
  <text x="180" y="226" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">2020</text>
  <text x="300" y="226" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">2022</text>
  <text x="400" y="226" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">2024</text>
  <text x="500" y="226" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">2025</text>
  <text x="600" y="226" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">2026</text>

  <!-- Bottom: E-Rate timeline -->
  <text x="56" y="270" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">E-Rate hotspot funding</text>

  <!-- 2020 baseline marker -->
  <rect x="160" y="278" width="80" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <text x="200" y="296" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">2020</text>
  <text x="200" y="312" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">on-premises only</text>

  <!-- 2024 expansion -->
  <rect x="380" y="278" width="80" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <text x="420" y="296" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">2024</text>
  <text x="420" y="312" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">hotspots eligible</text>

  <!-- 2025 rescission -->
  <rect x="480" y="278" width="100" height="40" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <text x="530" y="296" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">Sept 30, 2025</text>
  <text x="530" y="312" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">FCC 25-63 rolls back</text>

  <!-- Arrows from expansion to rescission -->
  <line x1="460" y1="298" x2="478" y2="298" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="240" y1="298" x2="378" y2="298" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Collision box -->
  <rect x="160" y="340" width="380" height="56" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <text x="350" y="360" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">Same year, same household: the personal phone goes into a pouch;</text>
  <text x="350" y="376" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">the federal substitute is denied. Two requests denied: $42.6M hotspots,</text>
  <text x="350" y="390" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">$15.3M school-bus Wi-Fi, 1,762 libraries.</text>

  <!-- Caption -->
  <text x="350" y="412" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">Different actors. Different institutional logics. Nobody adding them up.</text>
</svg>
