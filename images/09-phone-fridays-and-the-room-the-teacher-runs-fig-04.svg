<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig9-4-title fig9-4-desc">
  <title id="fig9-4-title">The five components of the third model, as a load-bearing stack</title>
  <desc id="fig9-4-desc">A five-row stack with the default-off rule at the base, scheduled tech time, contextual discretion, and trained discretion in the middle, and institutional backup at the top. Side arrows indicate that removing any middle layer collapses the structure.</desc>
  <defs>
    <marker id="arrow-fig4" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#1a1714"/>
    </marker>
    <marker id="arrow-fig4-down" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#6e5a3f"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="480" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="32" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1714">The five components, as a load-bearing stack</text>
  <text x="350" y="50" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Remove any middle layer and the structure collapses back to one of the two failure modes.</text>

  <!-- Left axis labels (load direction) -->
  <text x="48" y="80" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" text-anchor="start" fill="#4a4540">TOP — what holds the call when challenged</text>
  <text x="48" y="430" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" text-anchor="start" fill="#4a4540">BASE — what the policy already gets right</text>

  <!-- Stack column geometry: x=120 w=440, 5 rows -->
  <!-- Layer 5 (top): Institutional backup -->
  <rect x="120" y="88" width="440" height="58" fill="#f0ebe3" stroke="#1a1714" stroke-width="1.2"/>
  <rect x="120" y="88" width="8" height="58" fill="#6e5a3f"/>
  <text x="140" y="108" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">5 — Institutional backup</text>
  <text x="140" y="124" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Principal backs the call. AUP defines the exemption with enough specificity</text>
  <text x="140" y="138" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">to be teachable. Building-level coherence, not solo improvisation.</text>

  <!-- Layer 4: Trained discretion -->
  <rect x="120" y="148" width="440" height="58" fill="#fdfcfb" stroke="#1a1714" stroke-width="1.2"/>
  <rect x="120" y="148" width="8" height="58" fill="#6e5a3f"/>
  <text x="140" y="168" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">4 — Trained discretion</text>
  <text x="140" y="184" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">The teacher has been prepared to tell AI-assisted learning from cognitive</text>
  <text x="140" y="198" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">offloading. Without this, Layer 2 is just scheduled distraction time.</text>

  <!-- Layer 3: Teacher contextual discretion -->
  <rect x="120" y="208" width="440" height="58" fill="#fdfcfb" stroke="#1a1714" stroke-width="1.2"/>
  <rect x="120" y="208" width="8" height="58" fill="#6e5a3f"/>
  <text x="140" y="228" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">3 — Teacher contextual discretion</text>
  <text x="140" y="244" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Lesson-level call: what is the device for, with this group, for this assignment?</text>
  <text x="140" y="258" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Which students need the alternative track? When does the screen close?</text>

  <!-- Layer 2: Scheduled structured-tech time -->
  <rect x="120" y="268" width="440" height="58" fill="#fdfcfb" stroke="#1a1714" stroke-width="1.2"/>
  <rect x="120" y="268" width="8" height="58" fill="#6e5a3f"/>
  <text x="140" y="288" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">2 — Scheduled structured-tech time</text>
  <text x="140" y="304" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">A protected block when devices come out by design, not by exception.</text>
  <text x="140" y="318" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">The surface on which the educational exemption operates as a lesson.</text>

  <!-- Layer 1 (base): Default-off -->
  <rect x="120" y="328" width="440" height="58" fill="#1a1714" stroke="#1a1714" stroke-width="1.2"/>
  <text x="140" y="348" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#fdfcfb">1 — Default-off (the foundation)</text>
  <text x="140" y="364" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#fdfcfb">Devices are presumed absent. Use is the exception, not the assumption.</text>
  <text x="140" y="378" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#fdfcfb">What the prohibition statutes get right — and the third model keeps.</text>

  <!-- Right-side: removal arrows + collapse labels -->
  <!-- Arrow group label -->
  <text x="690" y="80" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" text-anchor="end" fill="#4a4540">REMOVE THIS LAYER →</text>

  <!-- Per-layer collapse outcome arrows (point from stack outward into label) -->
  <line x1="565" y1="117" x2="600" y2="117" stroke="#6e5a3f" stroke-width="1.2" marker-end="url(#arrow-fig4-down)"/>
  <text x="605" y="115" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">teacher is alone;</text>
  <text x="605" y="127" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">parent call breaks it</text>

  <line x1="565" y1="177" x2="600" y2="177" stroke="#6e5a3f" stroke-width="1.2" marker-end="url(#arrow-fig4-down)"/>
  <text x="605" y="175" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">permissive Fridays</text>
  <text x="605" y="187" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">with better branding</text>

  <line x1="565" y1="237" x2="600" y2="237" stroke="#6e5a3f" stroke-width="1.2" marker-end="url(#arrow-fig4-down)"/>
  <text x="605" y="235" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">scripted block,</text>
  <text x="605" y="247" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">no real adjustment</text>

  <line x1="565" y1="297" x2="600" y2="297" stroke="#6e5a3f" stroke-width="1.2" marker-end="url(#arrow-fig4-down)"/>
  <text x="605" y="295" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">discretion has</text>
  <text x="605" y="307" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">no time to live in</text>

  <line x1="565" y1="357" x2="600" y2="357" stroke="#6e5a3f" stroke-width="1.2" marker-end="url(#arrow-fig4-down)"/>
  <text x="605" y="355" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">back to total</text>
  <text x="605" y="367" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">permissiveness</text>

  <!-- Left side: vertical "load path" arrow showing the call is pressed downward through every layer -->
  <line x1="100" y1="100" x2="100" y2="370" stroke="#1a1714" stroke-width="1.2" marker-end="url(#arrow-fig4)"/>
  <text x="92" y="220" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1714" transform="rotate(-90, 92, 220)">load of the call presses down</text>

  <!-- Diagnostic key footer -->
  <line x1="120" y1="406" x2="560" y2="406" stroke="#d4cfc7" stroke-width="1"/>
  <text x="120" y="425" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#1a1714">Diagnostic key for the district comparisons below:</text>
  <text x="120" y="441" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">LAUSD pouches: bet Layer 1 alone could carry the structure. NYC 2006–15: same bet, without infrastructure.</text>
  <text x="120" y="455" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Stillwater 524.5: Layers 1 + 5 solid; 2, 3, 4 absent. Finland 2025 / Estonia AI Leap: all five components present.</text>
</svg>
