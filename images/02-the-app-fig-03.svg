<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="36" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Two per-student EdTech budgets, inverted: which line item the gain rides</text>

  <!-- Two stacked-bar columns -->
  <!-- Left column: ASSISTments-style ($46.23 total) -->
  <text x="180" y="84" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#1a1714" text-anchor="middle">ASSISTments (Maine trial)</text>
  <text x="180" y="100" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">$46.23 / student / year</text>

  <!-- Stack: tiny software, tiny hardware, big PD -->
  <rect x="130" y="112" width="100" height="6" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/>
  <text x="240" y="118" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Software ~$0</text>
  <rect x="130" y="120" width="100" height="6" fill="#8a8480" stroke="#1a1714" stroke-width="1"/>
  <text x="240" y="126" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Hardware ~$0</text>
  <rect x="130" y="128" width="100" height="180" fill="#4a4540" stroke="#1a1714" stroke-width="1"/>
  <text x="180" y="220" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#fdfcfb" text-anchor="middle">Teacher PD</text>
  <text x="180" y="236" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#fdfcfb" text-anchor="middle">~$46</text>

  <text x="180" y="334" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">Result: ~0.1 SD gain,</text>
  <text x="180" y="346" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">sustained one year out,</text>
  <text x="180" y="358" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">replicated in NC.</text>

  <!-- Right column: typical $1,000/student EdTech -->
  <text x="520" y="84" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#1a1714" text-anchor="middle">Typical district EdTech buy</text>
  <text x="520" y="100" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">~$1,000 / student / year</text>

  <!-- Stack: big software, big hardware, sliver PD -->
  <rect x="470" y="112" width="100" height="90" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/>
  <text x="520" y="158" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">Software seats</text>
  <text x="520" y="172" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">~$400</text>
  <rect x="470" y="202" width="100" height="90" fill="#8a8480" stroke="#1a1714" stroke-width="1"/>
  <text x="520" y="248" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#fdfcfb" text-anchor="middle">Hardware</text>
  <text x="520" y="262" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#fdfcfb" text-anchor="middle">~$550</text>
  <rect x="470" y="292" width="100" height="16" fill="#4a4540" stroke="#1a1714" stroke-width="1"/>
  <text x="582" y="304" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Teacher PD ~$50</text>

  <text x="520" y="334" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">Result: 2 of 3 licenses</text>
  <text x="520" y="346" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">never opened.</text>

  <!-- Comparison arrow between -->
  <line x1="240" y1="220" x2="460" y2="220" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="350" y="214" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">~22× cost,</text>
  <text x="350" y="228" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">inverted ratio</text>

  <!-- Caption -->
  <text x="350" y="402" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">In both cases the software cost ~nothing. The line item that determined outcomes was teacher time.</text>
</svg>
