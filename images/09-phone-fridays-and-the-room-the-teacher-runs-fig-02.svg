<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="420" fill="#fdfcfb"/>
  <text x="350" y="32" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1714">Tutor CoPilot — what an AI in the tutor's corner changes</text>
  <text x="350" y="50" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#4a4540">Wang, Ribeiro, Robinson, Loeb &amp; Demszky (2024) — 900 tutors, ~1,000 K-12 students, Title I district</text>

  <!-- Left bar group: overall -->
  <text x="180" y="88" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Overall mastery gain</text>
  <line x1="80" y1="280" x2="280" y2="280" stroke="#1a1714" stroke-width="1"/>
  <line x1="80" y1="100" x2="80" y2="280" stroke="#1a1714" stroke-width="1"/>
  <!-- y axis ticks -->
  <line x1="76" y1="280" x2="80" y2="280" stroke="#1a1714" stroke-width="1"/>
  <text x="72" y="284" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">0</text>
  <line x1="76" y1="235" x2="80" y2="235" stroke="#1a1714" stroke-width="1"/>
  <text x="72" y="239" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">3pp</text>
  <line x1="76" y1="190" x2="80" y2="190" stroke="#1a1714" stroke-width="1"/>
  <text x="72" y="194" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">6pp</text>
  <line x1="76" y1="145" x2="80" y2="145" stroke="#1a1714" stroke-width="1"/>
  <text x="72" y="149" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">9pp</text>

  <!-- Control bar (baseline) -->
  <rect x="115" y="280" width="50" height="0" fill="#c8c4c0" stroke="#1a1714"/>
  <text x="140" y="295" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Control</text>
  <text x="140" y="307" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">(baseline)</text>
  <!-- With AI bar +4pp -->
  <rect x="195" y="220" width="50" height="60" fill="#4a4540" stroke="#1a1714"/>
  <text x="220" y="215" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">+4pp</text>
  <text x="220" y="295" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Tutor with</text>
  <text x="220" y="307" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">CoPilot</text>

  <!-- Right bar group: lower-rated tutors -->
  <text x="500" y="88" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Lower-rated tutors only</text>
  <line x1="400" y1="280" x2="600" y2="280" stroke="#1a1714" stroke-width="1"/>
  <line x1="400" y1="100" x2="400" y2="280" stroke="#1a1714" stroke-width="1"/>
  <line x1="396" y1="280" x2="400" y2="280" stroke="#1a1714" stroke-width="1"/>
  <text x="392" y="284" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">0</text>
  <line x1="396" y1="235" x2="400" y2="235" stroke="#1a1714" stroke-width="1"/>
  <text x="392" y="239" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">3pp</text>
  <line x1="396" y1="190" x2="400" y2="190" stroke="#1a1714" stroke-width="1"/>
  <text x="392" y="194" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">6pp</text>
  <line x1="396" y1="145" x2="400" y2="145" stroke="#1a1714" stroke-width="1"/>
  <text x="392" y="149" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="end" fill="#4a4540">9pp</text>

  <rect x="435" y="280" width="50" height="0" fill="#c8c4c0" stroke="#1a1714"/>
  <text x="460" y="295" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Control</text>
  <text x="460" y="307" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">(baseline)</text>
  <rect x="515" y="145" width="50" height="135" fill="#1a1714" stroke="#1a1714"/>
  <text x="540" y="140" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">+9pp</text>
  <text x="540" y="295" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">Tutor with</text>
  <text x="540" y="307" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">CoPilot</text>

  <!-- Mechanism note -->
  <line x1="60" y1="340" x2="640" y2="340" stroke="#8a8480" stroke-width="1"/>
  <text x="350" y="362" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Mechanism: 350,000+ message exchanges analyzed</text>
  <text x="350" y="380" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">Tutors with AI in their corner asked more probing questions —</text>
  <text x="350" y="396" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">fewer "good job, keep going," more "what would happen if we changed this variable?"</text>
</svg>
