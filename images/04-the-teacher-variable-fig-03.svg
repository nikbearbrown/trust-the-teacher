  <text x="610" y="124" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Sustained</text>
  <text x="610" y="136" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">coaching</text>

