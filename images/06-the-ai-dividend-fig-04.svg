<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t604 d604">
  <title id="t604">Cumulative recovered school weeks over a ten-year career, AI-using vs non-AI-using teacher</title>
  <desc id="d604">A line chart over a ten-year career. One line slopes upward at roughly six school weeks per year, reaching about sixty weeks by year ten. A second line stays flat at zero. The widening vertical gap between them is annotated as the compounding dividend.</desc>
  <defs>
    <marker id="arrow604" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
    <marker id="arrow604open" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a4540"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="32" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">The compounding gap: cumulative school weeks recovered over a ten-year career</text>

  <!-- Plot area: x from 80 to 600 (10 years), y from 60 (top) to 320 (bottom) -->
  <!-- x: 0..10 years over 80..600  (52 px per year) -->
  <!-- y: 0..70 weeks over 320..60  (260 / 70 = ~3.71 px per week); 60 weeks at y = 320 - 60*3.714 = 320 - 222.86 = 97.14 -->

  <!-- Grid lines (horizontal) -->
  <line x1="80" y1="282" x2="600" y2="282" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="80" y1="245" x2="600" y2="245" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="80" y1="208" x2="600" y2="208" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="80" y1="171" x2="600" y2="171" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="80" y1="134" x2="600" y2="134" stroke="#c8c4c0" stroke-width="0.5"/>
  <line x1="80" y1="97" x2="600" y2="97" stroke="#c8c4c0" stroke-width="0.5"/>

  <!-- Axes -->
  <line x1="80" y1="60" x2="80" y2="320" stroke="#1a1714" stroke-width="1"/>
  <line x1="80" y1="320" x2="600" y2="320" stroke="#1a1714" stroke-width="1"/>

  <!-- Y-axis tick labels: weeks -->
  <text x="74" y="324" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">0</text>
  <text x="74" y="286" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">10</text>
  <text x="74" y="249" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">20</text>
  <text x="74" y="212" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">30</text>
  <text x="74" y="175" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">40</text>
  <text x="74" y="138" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">50</text>
  <text x="74" y="101" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">60</text>

  <!-- Y-axis title -->
  <text x="28" y="190" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="middle" transform="rotate(-90 28 190)">Cumulative school weeks recovered</text>

  <!-- X-axis tick labels: years 0..10 (52 px per year) -->
  <text x="80" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">0</text>
  <text x="132" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">1</text>
  <text x="184" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">2</text>
  <text x="236" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">3</text>
  <text x="288" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">4</text>
  <text x="340" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">5</text>
  <text x="392" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">6</text>
  <text x="444" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">7</text>
  <text x="496" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">8</text>
  <text x="548" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">9</text>
  <text x="600" y="336" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">10</text>

  <text x="340" y="352" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="middle">Years of teaching</text>

  <!-- Gap shading (cream) between zero line and AI-using line -->
  <!-- Points: AI-using: (80,320), (132,297.71), (184,275.43), (236,253.14), (288,230.86), (340,208.57), (392,186.29), (444,164), (496,141.71), (548,119.43), (600,97.14)  using 6 weeks/year * 3.714 px/week = 22.286 px per year -->
  <!-- Non-using: horizontal at y=320 -->
  <path d="M 80 320 L 132 297.71 L 184 275.43 L 236 253.14 L 288 230.86 L 340 208.57 L 392 186.29 L 444 164 L 496 141.71 L 548 119.43 L 600 97.14 L 600 320 Z" fill="#f5f2ee" opacity="0.85"/>

  <!-- Non-AI-using line (zero throughout): dashed mid-gray -->
  <line x1="80" y1="320" x2="600" y2="320" stroke="#8a8480" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- AI-using line: solid ink -->
  <polyline points="80,320 132,297.71 184,275.43 236,253.14 288,230.86 340,208.57 392,186.29 444,164 496,141.71 548,119.43 600,97.14" fill="none" stroke="#1a1714" stroke-width="2"/>

  <!-- Year markers (dots) on AI-using line -->
  <circle cx="80" cy="320" r="2.4" fill="#1a1714"/>
  <circle cx="132" cy="297.71" r="2.4" fill="#1a1714"/>
  <circle cx="184" cy="275.43" r="2.4" fill="#1a1714"/>
  <circle cx="236" cy="253.14" r="2.4" fill="#1a1714"/>
  <circle cx="288" cy="230.86" r="2.4" fill="#1a1714"/>
  <circle cx="340" cy="208.57" r="2.4" fill="#1a1714"/>
  <circle cx="392" cy="186.29" r="2.4" fill="#1a1714"/>
  <circle cx="444" cy="164" r="2.4" fill="#1a1714"/>
  <circle cx="496" cy="141.71" r="2.4" fill="#1a1714"/>
  <circle cx="548" cy="119.43" r="2.4" fill="#1a1714"/>
  <circle cx="600" cy="97.14" r="3.2" fill="#1a1714"/>

  <!-- Series labels -->
  <text x="606" y="97" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">AI-using teacher</text>
  <text x="606" y="110" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">~6 weeks / yr</text>

  <text x="606" y="318" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#4a4540">Non-using colleague</text>
  <text x="606" y="331" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">0 weeks / yr</text>

  <!-- Year 10 endpoint annotation: ~60 weeks ≈ 1.5 years -->
  <text x="568" y="89" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="end">60 weeks ≈ 1.5 school years</text>

  <!-- Gap annotation: vertical arrow at year 7 spanning the gap -->
  <!-- At year 7 (x=444): AI line y=164, non-using y=320 -->
  <line x1="444" y1="320" x2="444" y2="170" stroke="#4a4540" stroke-width="1" stroke-dasharray="2 2" marker-end="url(#arrow604open)"/>

  <!-- Compounding dividend callout -->
  <line x1="316" y1="240" x2="438" y2="244" stroke="#4a4540" stroke-width="1" fill="none" marker-end="url(#arrow604open)"/>
  <text x="248" y="232" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">The compounding dividend</text>
  <text x="248" y="246" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">the widening gap is the time</text>
  <text x="248" y="258" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">one teacher has and the other</text>
  <text x="248" y="270" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">does not</text>

  <!-- Year-1 annotation (small) -->
  <line x1="148" y1="297.71" x2="172" y2="285" stroke="#4a4540" stroke-width="0.8" fill="none"/>
  <text x="176" y="284" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">year 1: 6 weeks</text>

  <!-- Bottom caption / source -->
  <line x1="80" y1="370" x2="600" y2="370" stroke="#c8c4c0" stroke-width="0.5"/>
  <text x="350" y="388" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">Illustrative projection. Inputs: 5.9 h/week × 36-week school year ≈ 6 school weeks recovered per year (Gallup-Walton 2025, weekly AI users).</text>
  <text x="350" y="404" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">Persistence over a full career is the open empirical question; the line shows the simple-compounding scenario, not a measured longitudinal panel.</text>
</svg>
