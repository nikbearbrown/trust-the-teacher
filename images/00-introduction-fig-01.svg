<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="ttbm-t ttbm-d">
  <title id="ttbm-t">Book map: twelve chapters across three movements, traced by the AI+1 teacher thread</title>
  <desc id="ttbm-d">Three columns group the book's twelve chapters into Movement I (The Wrong Answers, Ch. 1–3), Movement II (The Evidence, Ch. 4–7), and Movement III (The Work, Ch. 8–12). A dashed thread connects chapters 2, 5, 6, 8, 9, and 12 — the recurring appearances of the AI+1 teacher.</desc>
  <defs>
    <style>
      .ti { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: bold; fill: #2a1a0e; }
      .mv { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; font-weight: bold; fill: #2a1a0e; }
      .mvs { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
      .ch { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 11px; fill: #2a1a0e; }
      .chn { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #4a4540; }
      .lg { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; fill: #2a1a0e; }
      .cap { font-family: 'EB Garamond', Georgia, 'Times New Roman', serif; font-size: 10px; font-style: italic; fill: #4a4540; }
    </style>
    <marker id="ttbm-ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
  </defs>

  <rect width="700" height="460" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="30" class="ti" text-anchor="middle">The shape of the argument — twelve chapters, three movements, one thread</text>
  <text x="350" y="46" class="cap" text-anchor="middle">The dashed line is the AI+1 teacher; she appears six times before the book lets the reader see her whole.</text>

  <!-- Movement headers -->
  <text x="120" y="80" class="mv" text-anchor="middle">Movement I</text>
  <text x="120" y="94" class="mvs" text-anchor="middle">The Wrong Answers</text>
  <text x="350" y="80" class="mv" text-anchor="middle">Movement II</text>
  <text x="350" y="94" class="mvs" text-anchor="middle">The Evidence</text>
  <text x="580" y="80" class="mv" text-anchor="middle">Movement III</text>
  <text x="580" y="94" class="mvs" text-anchor="middle">The Work</text>

  <!-- Movement header underlines -->
  <line x1="55" y1="102" x2="185" y2="102" stroke="#2a1a0e" stroke-width="0.75"/>
  <line x1="285" y1="102" x2="415" y2="102" stroke="#2a1a0e" stroke-width="0.75"/>
  <line x1="515" y1="102" x2="645" y2="102" stroke="#2a1a0e" stroke-width="0.75"/>

  <!-- Movement I: Ch 1, 2, 3 -->
  <!-- Ch 1 -->
  <rect x="55" y="118" width="130" height="42" fill="#fdfcfb" stroke="#8a8480" stroke-width="1"/>
  <text x="63" y="134" class="chn">CH. 1</text>
  <text x="63" y="151" class="ch">The Ban</text>

  <!-- Ch 2 (on thread) -->
  <rect x="55" y="170" width="130" height="42" fill="#f5f2ee" stroke="#2a1a0e" stroke-width="1.25"/>
  <text x="63" y="186" class="chn">CH. 2</text>
  <text x="63" y="203" class="ch">The App</text>
  <circle cx="178" cy="191" r="3.5" fill="#2a1a0e"/>

  <!-- Ch 3 -->
  <rect x="55" y="222" width="130" height="42" fill="#fdfcfb" stroke="#8a8480" stroke-width="1"/>
  <text x="63" y="238" class="chn">CH. 3</text>
  <text x="63" y="255" class="ch">The Clause</text>

  <!-- Movement II: Ch 4, 5, 6, 7 -->
  <rect x="285" y="118" width="130" height="42" fill="#fdfcfb" stroke="#8a8480" stroke-width="1"/>
  <text x="293" y="134" class="chn">CH. 4</text>
  <text x="293" y="151" class="ch">Teacher Variable</text>

  <rect x="285" y="170" width="130" height="42" fill="#f5f2ee" stroke="#2a1a0e" stroke-width="1.25"/>
  <text x="293" y="186" class="chn">CH. 5</text>
  <text x="293" y="203" class="ch">Professional Tool</text>
  <circle cx="285" cy="191" r="3.5" fill="#2a1a0e"/>
  <circle cx="408" cy="191" r="3.5" fill="#2a1a0e"/>

  <rect x="285" y="222" width="130" height="42" fill="#f5f2ee" stroke="#2a1a0e" stroke-width="1.25"/>
  <text x="293" y="238" class="chn">CH. 6</text>
  <text x="293" y="255" class="ch">AI Dividend</text>
  <circle cx="285" cy="243" r="3.5" fill="#2a1a0e"/>
  <circle cx="408" cy="243" r="3.5" fill="#2a1a0e"/>

  <rect x="285" y="274" width="130" height="42" fill="#fdfcfb" stroke="#8a8480" stroke-width="1"/>
  <text x="293" y="290" class="chn">CH. 7</text>
  <text x="293" y="307" class="ch">Cognitive Offloading</text>

  <!-- Movement III: Ch 8, 9, 10, 11, 12 -->
  <rect x="515" y="118" width="130" height="42" fill="#f5f2ee" stroke="#2a1a0e" stroke-width="1.25"/>
  <text x="523" y="134" class="chn">CH. 8</text>
  <text x="523" y="151" class="ch">Train Like a Doctor</text>
  <circle cx="515" cy="139" r="3.5" fill="#2a1a0e"/>

  <rect x="515" y="170" width="130" height="42" fill="#f5f2ee" stroke="#2a1a0e" stroke-width="1.25"/>
  <text x="523" y="186" class="chn">CH. 9</text>
  <text x="523" y="203" class="ch">Phone Fridays</text>
  <circle cx="515" cy="191" r="3.5" fill="#2a1a0e"/>

  <rect x="515" y="222" width="130" height="42" fill="#fdfcfb" stroke="#8a8480" stroke-width="1"/>
  <text x="523" y="238" class="chn">CH. 10</text>
  <text x="523" y="255" class="ch">Three Honest Measures</text>

  <rect x="515" y="274" width="130" height="42" fill="#fdfcfb" stroke="#8a8480" stroke-width="1"/>
  <text x="523" y="290" class="chn">CH. 11</text>
  <text x="523" y="307" class="ch">The Equity Argument</text>

  <rect x="515" y="326" width="130" height="42" fill="#f5f2ee" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="523" y="342" class="chn">CH. 12</text>
  <text x="523" y="359" class="ch" font-weight="bold">The AI+1 Teacher</text>
  <circle cx="515" cy="347" r="3.5" fill="#2a1a0e"/>

  <!-- AI+1 thread: 2 -> 5 -> 6 -> 8 -> 9 -> 12 (dashed) -->
  <path d="M 178 191 C 230 191, 240 191, 285 191"
        fill="none" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="5 3"/>
  <path d="M 408 191 C 440 191, 440 243, 408 243"
        fill="none" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="5 3"/>
  <path d="M 408 243 C 460 243, 470 139, 515 139"
        fill="none" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="5 3"/>
  <path d="M 515 139 C 485 139, 485 191, 515 191"
        fill="none" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="5 3"/>
  <path d="M 515 191 C 480 191, 480 347, 515 347"
        fill="none" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="5 3"
        marker-end="url(#ttbm-ar)"/>

  <!-- Legend -->
  <rect x="55" y="402" width="14" height="14" fill="#f5f2ee" stroke="#2a1a0e" stroke-width="1.25"/>
  <text x="76" y="414" class="lg">Chapter where the AI+1 teacher appears</text>

  <rect x="285" y="402" width="14" height="14" fill="#fdfcfb" stroke="#8a8480" stroke-width="1"/>
  <text x="306" y="414" class="lg">Chapter without her — argument scaffolding</text>

  <line x1="515" y1="409" x2="545" y2="409" stroke="#2a1a0e" stroke-width="1.25" stroke-dasharray="5 3"/>
  <text x="552" y="414" class="lg">The AI+1 thread (Ch. 2→5→6→8→9→12)</text>

  <!-- Caption -->
  <text x="350" y="442" class="cap" text-anchor="middle">Read in order: the wrong answers, then the evidence, then the work. The thread arrives by chapter twelve.</text>
</svg>
