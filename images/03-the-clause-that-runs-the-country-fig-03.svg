  <rect width="700" height="420" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="36" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">Title II-A federal teacher-training funds: where the dollars do not go</text>
  <text x="350" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#4a4540" text-anchor="middle">SETDA, November 2025 — funding gap underneath the educational-purposes exemption</text>

  <!-- Panel A: Stacked bar — share of LEAs using Title II-A for tech-related PD -->
  <text x="180" y="88" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#1a1714" text-anchor="middle">Panel A — Local education agencies</text>
  <text x="180" y="102" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">% using Title II-A for technology PD</text>

  <!-- Axis -->
  <line x1="80" y1="320" x2="280" y2="320" stroke="#1a1714" stroke-width="1"/>
  <line x1="80" y1="120" x2="80" y2="320" stroke="#1a1714" stroke-width="1"/>
  <text x="74" y="124" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">100%</text>
  <text x="74" y="220" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">50%</text>
  <text x="74" y="320" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="end">0%</text>

  <!-- Bar 1: Tech PD (<40%) -->
  <rect x="110" y="200" width="60" height="120" fill="#4a4540" stroke="#1a1714" stroke-width="1"/>
  <text x="140" y="194" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">&lt;40%</text>
  <text x="140" y="338" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Tech PD</text>

  <!-- Bar 2: Non-tech PD (>60%) -->
  <rect x="200" y="120" width="60" height="200" fill="#c8c4c0" stroke="#1a1714" stroke-width="1"/>
  <text x="230" y="114" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">&gt;60%</text>
  <text x="230" y="338" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#1a1714" text-anchor="middle">Non-tech PD</text>

  <!-- Divider -->
