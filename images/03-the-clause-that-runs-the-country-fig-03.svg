  <text x="510" y="324" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">41 do not</text>

  <!-- Caption -->
  <text x="350" y="402" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">The exemption is a delegation to a workforce. The workforce has not been funded for the delegation.</text>
