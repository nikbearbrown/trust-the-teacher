<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#fdfcfb"/>

  <!-- Title -->
  <text x="350" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">The fluency trap: what learning feels like is not what learning is</text>

  <!-- Two columns -->
  <!-- Left: feels like understanding -->
  <rect x="48" y="68" width="280" height="240" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <text x="188" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#1a1714" text-anchor="middle">Feels like understanding</text>
  <line x1="64" y1="100" x2="312" y2="100" stroke="#8a8480" stroke-width="0.6"/>

  <text x="64" y="124" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">• Smooth — explanations resolve fast</text>
  <text x="64" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">• Fluent — sentences land confidently</text>
  <text x="64" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">• Confident — predicts good retrieval</text>
  <text x="64" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">• Re-reading the page; watching</text>
  <text x="64" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">   the clear YouTube explanation</text>
  <text x="64" y="234" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">• AI hands the answer; student nods</text>
  <text x="64" y="258" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">• Metacognitive cue: I know this</text>

  <!-- Right: is understanding -->
  <rect x="372" y="68" width="280" height="240" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
  <text x="512" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#1a1714" text-anchor="middle">Is understanding</text>
  <line x1="388" y1="100" x2="636" y2="100" stroke="#8a8480" stroke-width="0.6"/>

  <text x="388" y="124" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">• Effortful — answer arrives slowly</text>
  <text x="388" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">• Frictional — student commits, fails,</text>
  <text x="388" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">   tries again</text>
  <text x="388" y="186" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">• Pessimistic — predicts poor recall</text>
  <text x="388" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">• Retrieval practice; interleaved</text>
  <text x="388" y="224" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">   problem types; spaced review</text>
  <text x="388" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">• Durable — retrieves without tool</text>
  <text x="388" y="272" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">• Reality: I can actually do this</text>

  <!-- Crossed arrows showing metacognitive cues map to wrong column -->
  <text x="350" y="184" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714" text-anchor="middle">↕</text>
  <text x="350" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#4a4540" text-anchor="middle">cues</text>
  <text x="350" y="212" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#4a4540" text-anchor="middle">lie</text>

  <!-- Bottom: the predicted-vs-actual retrieval gap -->
  <line x1="48" y1="328" x2="652" y2="328" stroke="#1a1714" stroke-width="0.8"/>

  <text x="350" y="350" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="bold" fill="#1a1714" text-anchor="middle">The Bjorks' inverse coupling</text>
  <text x="350" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">When retrieval is easy in the moment, the retrieval event builds almost no storage strength.</text>
  <text x="350" y="386" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">When retrieval is effortful and successful, storage strength builds substantially.</text>
  <text x="350" y="404" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540" text-anchor="middle">Sources: Bjork &amp; Bjork (1992); Koriat &amp; Bjork (2005); Roediger &amp; Karpicke (2006).</text>
</svg>
