<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="420" fill="#fdfcfb"/>
  <text x="350" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1714">The three governance models compared</text>

  <!-- Column headers -->
  <rect x="32" y="56" width="160" height="34" fill="#1a1714" stroke="#1a1714"/>
  <text x="112" y="78" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#fdfcfb">Dimension</text>
  <rect x="192" y="56" width="158" height="34" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="271" y="74" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Total prohibition</text>
  <text x="271" y="86" font-family="Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">(bell-to-bell ban)</text>
  <rect x="350" y="56" width="158" height="34" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="429" y="74" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Total permissiveness</text>
  <text x="429" y="86" font-family="Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">(case-by-case)</text>
  <rect x="508" y="56" width="160" height="34" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="588" y="74" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Professional discretion</text>
  <text x="588" y="86" font-family="Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">(third model)</text>

  <!-- Row 1: Rule type -->
  <rect x="32" y="90" width="160" height="60" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="40" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">Rule type</text>
  <rect x="192" y="90" width="158" height="60" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="200" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">One rule for all</text>
  <text x="200" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">classrooms, all day,</text>
  <text x="200" y="144" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">no exceptions</text>
  <rect x="350" y="90" width="158" height="60" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="358" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">No rule; teachers</text>
  <text x="358" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">improvise individually</text>
  <text x="358" y="144" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">in the moment</text>
  <rect x="508" y="90" width="160" height="60" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="516" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Default-off + scheduled</text>
  <text x="516" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">structured-tech time +</text>
  <text x="516" y="144" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">trained discretion</text>

  <!-- Row 2: Decision-maker -->
  <rect x="32" y="150" width="160" height="60" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="40" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">Decision-maker</text>
  <rect x="192" y="150" width="158" height="60" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="200" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">State legislature</text>
  <text x="200" y="188" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">or district policy</text>
  <text x="200" y="204" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">office</text>
  <rect x="350" y="150" width="158" height="60" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="358" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Individual teacher,</text>
  <text x="358" y="188" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">moment by moment,</text>
  <text x="358" y="204" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">unsupported</text>
  <rect x="508" y="150" width="160" height="60" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="516" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Trained teacher,</text>
  <text x="516" y="188" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">backed by building</text>
  <text x="516" y="204" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">norms and admin</text>

  <!-- Row 3: What flexes -->
  <rect x="32" y="210" width="160" height="60" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="40" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">What flexes</text>
  <rect x="192" y="210" width="158" height="60" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="200" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Nothing — only</text>
  <text x="200" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">medical or IEP</text>
  <text x="200" y="264" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">accommodations</text>
  <rect x="350" y="210" width="158" height="60" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="358" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Everything; rules</text>
  <text x="358" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">vary by classroom,</text>
  <text x="358" y="264" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">period, and student</text>
  <rect x="508" y="210" width="160" height="60" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="516" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Lesson-level use</text>
  <text x="516" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">inside scheduled</text>
  <text x="516" y="264" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">structured-tech time</text>

  <!-- Row 4: What breaks -->
  <rect x="32" y="270" width="160" height="80" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="40" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#1a1714">What breaks</text>
  <rect x="192" y="270" width="158" height="80" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="200" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Enforcement falls</text>
  <text x="200" y="308" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">hardest on low-income</text>
  <text x="200" y="324" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">schools; educational</text>
  <text x="200" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">use disappears</text>
  <rect x="350" y="270" width="158" height="80" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="358" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Norms erode unevenly;</text>
  <text x="358" y="308" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">teachers spend 20–30%</text>
  <text x="358" y="324" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">of class on phone</text>
  <text x="358" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">redirection</text>
  <rect x="508" y="270" width="160" height="80" fill="#fdfcfb" stroke="#1a1714"/>
  <text x="516" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">Collapses without</text>
  <text x="516" y="308" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">trained discretion;</text>
  <text x="516" y="324" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">needs sustained</text>
  <text x="516" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">coaching investment</text>

  <text x="350" y="390" font-family="Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#4a4540">The first two models try to solve at the policy level a problem that lives at the classroom level.</text>
</svg>
