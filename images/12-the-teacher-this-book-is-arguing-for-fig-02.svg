<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="420" fill="#fdfcfb"/>
  <text x="350" y="32" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1714">Three sentences, three chapters — what the directive rests on</text>
  <text x="350" y="50" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#4a4540">Each line is wallpaper unless the structural commitment beneath it is real</text>

  <!-- Sentence 1 -->
  <rect x="40" y="84" width="200" height="100" fill="#1a1714" stroke="#1a1714"/>
  <text x="140" y="116" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fdfcfb">Trust</text>
  <text x="140" y="138" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fdfcfb">the teacher.</text>
  <text x="140" y="166" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#c8c4c0">(directive)</text>

  <line x1="140" y1="186" x2="140" y2="228" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="40" y="234" width="200" height="116" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="140" y="258" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Chapter 4</text>
  <text x="140" y="276" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">The teacher</text>
  <text x="140" y="290" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">variable</text>
  <text x="50" y="316" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Teacher quality is the</text>
  <text x="50" y="328" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">largest in-school predictor</text>
  <text x="50" y="340" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">of student learning.</text>

  <!-- Sentence 2 -->
  <rect x="252" y="84" width="200" height="100" fill="#1a1714" stroke="#1a1714"/>
  <text x="352" y="116" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fdfcfb">Train</text>
  <text x="352" y="138" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fdfcfb">the teacher.</text>
  <text x="352" y="166" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#c8c4c0">(directive)</text>

  <line x1="352" y1="186" x2="352" y2="228" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="252" y="234" width="200" height="116" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="352" y="258" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Chapter 8</text>
  <text x="352" y="276" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">The doctor</text>
  <text x="352" y="290" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">analogy</text>
  <text x="262" y="316" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Medicine pays for the</text>
  <text x="262" y="328" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">preparation that makes</text>
  <text x="262" y="340" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">judgment trustworthy.</text>

  <!-- Sentence 3 -->
  <rect x="464" y="84" width="200" height="100" fill="#1a1714" stroke="#1a1714"/>
  <text x="564" y="116" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fdfcfb">Measure</text>
  <text x="564" y="138" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fdfcfb">what matters.</text>
  <text x="564" y="166" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" text-anchor="middle" fill="#c8c4c0">(directive)</text>

  <line x1="564" y1="186" x2="564" y2="228" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="464" y="234" width="200" height="116" fill="#f5f2ee" stroke="#1a1714"/>
  <text x="564" y="258" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1714">Chapter 10</text>
  <text x="564" y="276" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">Three honest</text>
  <text x="564" y="290" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">measures</text>
  <text x="474" y="316" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">Wellbeing, learning gains,</text>
  <text x="474" y="328" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">teacher learning — each</text>
  <text x="474" y="340" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#4a4540">used for what it can do.</text>

  <line x1="60" y1="372" x2="640" y2="372" stroke="#8a8480" stroke-width="1"/>
  <text x="350" y="394" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" text-anchor="middle" fill="#1a1714">Singapore put three words on a wall in 2004. Finland wrote two. Slogans work when the structure beneath them is real.</text>
  <text x="350" y="408" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" text-anchor="middle" fill="#4a4540">A directive without the four sections beneath it is wallpaper.</text>
</svg>
